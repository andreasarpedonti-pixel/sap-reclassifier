  return `<div class="sw" id="wrap_${uid}">
    <button type="button" class="sb2${value?' cv':''}" onclick="toggleDrop('${uid}','${esc(accountId)}','${field}')" title="${esc(node?.name||'')}">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${esc(label)}</span>
      <span style="display:flex;align-items:center;gap:2px;flex-shrink:0">
        ${value?`<span onclick="event.stopPropagation();setMap('${esc(accountId)}','${field}','')" style="font-size:10px;cursor:pointer">✕</span>`:''}▾
      </span>
    </button>
  </div>`;
}

function toggleDrop(uid,accountId,field) {
  if(_openDrop&&_openDrop!==uid){document.getElementById('drop_'+_openDrop)?.remove();}
  if(document.getElementById('drop_'+uid)){document.getElementById('drop_'+uid).remove();_openDrop=null;return;}
  _openDrop=uid;
  const struct=(field==='civD'||field==='civC')?S.civile:S.corporate;
  const wrap=document.getElementById('wrap_'+uid); if(!wrap) return;
  const drop=document.createElement('div');
  drop.className='sd'; drop.id='drop_'+uid;
  const si=document.createElement('input'); si.type='text'; si.placeholder='Cerca...';
  si.oninput=()=>fillDrop(drop,struct,accountId,field,si.value);
  drop.appendChild(si);
  const list=document.createElement('div'); list.className='sl'; drop.appendChild(list);
  wrap.appendChild(drop);
  fillDrop(drop,struct,accountId,field,'');
  si.focus();
  setTimeout(()=>document.addEventListener('click',function h(e){
    if(!drop.contains(e.target)&&!wrap.contains(e.target)){drop.remove();_openDrop=null;document.removeEventListener('click',h);}
  }),0);
}

function fillDrop(drop,struct,accountId,field,search) {
  const list=drop.querySelector('.sl'); if(!list) return;
  const cur=(S.mapping[accountId]||{})[field]||'';
  const lo=search.toLowerCase();
  const vis=lo?struct.filter(n=>n.id.toLowerCase().includes(lo)||n.name.toLowerCase().includes(lo)):struct;
  if(!vis.length){list.innerHTML='<div style="text-align:center;color:#a8a29e;padding:8px;font-size:11px">Nessun risultato</div>';return;}
  // In search mode: mostra tutto piatto; altrimenti albero collassato
  if(lo) {
    list.innerHTML=vis.map(n=>{
      const isSel=n.id===cur;
      return `<div class="so${isSel?' sel':''}" style="padding-left:9px" onclick="setMap('${esc(accountId)}','${field}','${esc(n.id)}')">
        <span style="font-family:monospace;font-size:10px;color:#a8a29e;min-width:50px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.id.length>14?n.id.slice(0,13)+'…':n.id)}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.name)}</span>
        ${isSel?'<span>✓</span>':''}
      </div>`;
    }).join('');
    return;
  }
  // Albero con expand lazy — solo radici visibili, figli caricati al click
  const dropExp=new Set(); // espansi in questo dropdown
  // Se il nodo corrente è selezionato, espandi il suo path
  if(cur) {
    let n=struct.find(x=>x.id===cur);
    while(n&&n.parentId){const p=struct.find(x=>x.id===n.parentId);if(p){dropExp.add(p.id);}n=p;}
  }
  function nodeHTML(n,lv) {
    const isSel=n.id===cur;
    const ch=struct.filter(c=>c.parentId===n.id);
    const isExp=lv===0||dropExp.has(n.id);
    const tog=ch.length
      ? `<span class="dtog" data-nid="${esc(n.id)}" style="cursor:pointer;margin-right:3px;font-size:9px;color:#94a3b8">${isExp?'▼':'▶'}</span>`
      : '<span style="display:inline-block;width:11px"></span>';
    return `<div class="so${isSel?' sel':''}" style="padding-left:${lv*12+9}px" onclick="setMap('${esc(accountId)}','${field}','${esc(n.id)}')">
      ${tog}
      <span style="font-family:monospace;font-size:10px;color:#a8a29e;min-width:50px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.id.length>14?n.id.slice(0,13)+'…':n.id)}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.name)}</span>
      ${isSel?'<span style="color:#22c55e">✓</span>':''}
    </div>${isExp?ch.map(c=>nodeHTML(c,lv+1)).join(''):''}`;
  }
  const roots=struct.filter(n=>!n.parentId);
  list.innerHTML=roots.map(r=>nodeHTML(r,0)).join('');
  // Click sui toggle espande/collassa senza chiudere il dropdown
  list.querySelectorAll('.dtog').forEach(tog=>{
    tog.addEventListener('click',e=>{
      e.stopPropagation();
      const nid=tog.dataset.nid;
      if(dropExp.has(nid)) dropExp.delete(nid); else dropExp.add(nid);
      // Ricostruisci solo la lista
      list.innerHTML=roots.map(r=>nodeHTML(r,0)).join('');
      list.querySelectorAll('.dtog').forEach(t2=>{
        t2.addEventListener('click',e2=>{
          e2.stopPropagation();
          const nid2=t2.dataset.nid;
          if(dropExp.has(nid2)) dropExp.delete(nid2); else dropExp.add(nid2);
          list.innerHTML=roots.map(r=>nodeHTML(r,0)).join('');
        });
      });
    });
  });
}

function setMap(accountId,field,value) {
  set(s=>({mapping:{...s.mapping,[accountId]:{...(s.mapping[accountId]||{}),[field]:value}}}));
  document.getElementById('drop_'+'sel_'+accountId+'_'+field)?.remove();
  _openDrop=null;
  // Aggiorna il pulsante della cella senza ricaricare tutta la tabella
  const uid='sel_'+accountId+'_'+field;
  const wrap=document.getElementById('wrap_'+uid);
  if(wrap) {
    const struct=(field==='civD'||field==='civC')?S.civile:S.corporate;
    wrap.outerHTML=mkSel(accountId,field,struct,value);
  }
}

function clearMapping(which) {
  const label  = which==='civ' ? 'Civile (Dare + Avere)' : 'Corporate (Dare + Avere)';
  const fields = which==='civ' ? ['civD','civC'] : ['corpD','corpC'];
  const count  = S.coa.filter(a => fields.some(f => S.mapping[a.id]?.[f])).length;
  if (count === 0) { alert('La mappatura ' + label + ' è già vuota.'); return; }
  if (!confirm(
    'Cancellare tutta la mappatura ' + label + '?\n\n' +
    count + ' conti verranno azzerati.\n\n' +
    'Questa operazione non è reversibile.'
  )) return;
  const newMap = {};
  S.coa.forEach(a => {
    const m = { ...(S.mapping[a.id] || {}) };
    fields.forEach(f => { m[f] = ''; });
    newMap[a.id] = m;
  });
  S.mapping = newMap;
  rMap();
  // feedback inline
  const _fb=document.createElement('div');
  _fb.className='alert ok';
  _fb.style.cssText='margin:8px 0;transition:opacity .5s';
  _fb.textContent='✓ Mappatura '+label+' azzerata — '+count+' conti resettati.';
  const _pg=document.getElementById('pg-map');
  if(_pg&&_pg.children[1]){_pg.insertBefore(_fb,_pg.children[1]);setTimeout(()=>{_fb.style.opacity='0';setTimeout(()=>_fb.remove(),500);},3000);}
}

function expMapCSV() {
  const rows=['ID Conto;Nome Conto;Civ Dare;Civ Avere;Corp Dare;Corp Avere'];
  S.coa.forEach(a=>{
    const m=S.mapping[a.id]||{};
    rows.push([a.id,a.name,m.civD||'',m.civC||'',m.corpD||'',m.corpC||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';'));
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.join('\n'));
  a.download='mapping_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
}

async function impMapCSV(inp) {
  const f=inp.files[0]; if(!f) return;
  try {
    let rows;
    if(f.name.toLowerCase().endsWith('.xlsx')) {
      const wb=await XLSX.read(await f.arrayBuffer());
      rows=wb.Sheets[wb.SheetNames[0]];
    } else {
      rows=parseCSV(await f.text());
    }
    const {mapping,coa}=parseMappingCSV(rows);
    const n=Object.keys(mapping).length;
    if(!n){alert('Nessun mapping trovato. Assicurati che le colonne siano: ID, Nome, Civ Dare, Civ Avere, Corp Dare, Corp Avere');inp.value='';return;}
    const existing=Object.keys(S.mapping).length;
    set(s=>({mapping:{...s.mapping,...mapping},coa:s.coa.length>0?s.coa:coa}));
    rMap();
    alert('✓ Importati '+n+' mapping'+(existing?' (aggiunti a '+existing+' esistenti)':'')+'. Totale: '+Object.keys(S.mapping).length+'.');
  } catch(ex){alert('Errore: '+ex.message);}
  inp.value='';
}

// ══════════════════════════════════════════════════════════
// REPORT
// ══════════════════════════════════════════════════════════
let rptType='civ';
let rptMode='ytd';
let rptPeriods=[];
let rptExpand=true;
let rptGroupQ=false;   // raggruppamento per quarter
const rptCollapsed=new Set(); // IDs nodi collassati

// Ricostruisce l'intera pagina report (solo alla prima apertura o cambio tipo)
function rReport() {
  const allP=S.bilanci.map(b=>b.period);
  if(!rptPeriods.length&&allP.length) rptPeriods=[...allP];

  function grp(children) {
    return `<div style="display:flex;gap:2px;background:#e7e5e4;padding:2px;border-radius:7px">${children}</div>`;
  }
  function tb(label,active,onclick,title='') {
    return `<button class="btn btn-sm ${active?'btn-on':'btn-off'}" onclick="${onclick}"${title?` title="${title}"`:''}>${label}</button>`;
  }

  document.getElementById('pg-report').innerHTML=`
    <div id="rpt-outer">
      <div id="rpt-controls" style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${grp(
            tb('📊 Civile',   rptType==='civ',  "rptType='civ';rReport()")+
            tb('🏢 Corporate',rptType==='corp', "rptType='corp';rReport()")
          )}
          ${grp(
            tb('YTD',rptMode==='ytd',"setMode('ytd')","Saldo finale")+
            tb('PTD',rptMode==='ptd',"setMode('ptd')","Saldo finale − iniziale")
          )}
          ${allP.length?grp(
            allP.map(p=>tb(esc(p),rptPeriods.includes(p),`togglePeriod('${esc(p)}')`)).join('')+
            (allP.length>1?`<button class="btn btn-sm btn-off" onclick="selAllP()" title="Seleziona tutti">Tutti</button>`:'')
          ):''}
          ${grp(tb('≡ Conti',rptExpand,"toggleExpand()"))}
          ${grp(tb('📅 Quarter',rptGroupQ,"toggleGroupQ()","Aggrega per quarter fiscale (Q1=Apr-Giu, Q2=Lug-Set, Q3=Ott-Dic, Q4=Gen-Mar)"))}
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn btn-sm btn-off no-print" onclick="expRptCSV()">⬇ CSV</button>
          <button class="btn btn-sm btn-off no-print" onclick="printBilancio()">🖨 Stampa</button>
        </div>
      </div>
        ${S.bilanci.length===0
        ?`<div class="alert warn" style="margin-top:10px">⚠ Nessun bilancio caricato. Vai su "Importa dati".</div>`
        :`<div class="print-header" style="margin-bottom:12px">
        <h2>Serom Medical Technology s.r.l.</h2>
        <p id="print-subtitle">Bilancio riclassificato</p>
        <hr>
      </div>
      <div id="rpt-scroll"><table class="rpt-tbl" id="rpt-tbl"></table></div>`}
    </div>`;
  rRptTable();
}

function setMode(m)    { rptMode=m;    rUpdControls(); rRptTable(); }
function toggleExpand(){ rptExpand=!rptExpand; rUpdControls(); rRptTable(); }
function toggleGroupQ(){ rptGroupQ=!rptGroupQ; rUpdControls(); rRptTable(); }
function selAllP()     { rptPeriods=[...S.bilanci.map(b=>b.period)]; rUpdControls(); rRptTable(); }

function togglePeriod(p) {
  if(rptPeriods.includes(p)) { if(rptPeriods.length===1) return; rptPeriods=rptPeriods.filter(x=>x!==p); }
  else rptPeriods=[...rptPeriods,p].sort();
  rUpdControls();
  rRptTable();
}

// Aggiorna solo i colori dei pulsanti senza ricostruire la pagina
function rUpdControls() {
  const allP=S.bilanci.map(b=>b.period);
  document.querySelectorAll('#rpt-controls button').forEach(b=>{
    const t=b.textContent.trim().replace(/[📊🏢]/g,'').trim();
    let active=false;
    if(t==='Civile'||t==='📊 Civile')   active=rptType==='civ';
    else if(t==='Corporate'||t==='🏢 Corporate') active=rptType==='corp';
    else if(t==='YTD')   active=rptMode==='ytd';
    else if(t==='PTD')   active=rptMode==='ptd';
    else if(t==='≡ Conti') active=rptExpand;
    else if(t==='📅 Quarter') active=rptGroupQ;
    else if(allP.includes(b.textContent.trim())) active=rptPeriods.includes(b.textContent.trim());
    else return; // Tutti, CSV, Stampa — non toccare
    b.className='btn btn-sm '+(active?'btn-on':'btn-off');
  });
}

// Collasso: nasconde/mostra ricorsivamente tutti i discendenti DOM
function toggleCollapse(nodeId) {
  if(rptCollapsed.has(nodeId)) rptCollapsed.delete(nodeId);
  else rptCollapsed.add(nodeId);
  applyCollapse();
}

function applyCollapse() {
  // Calcola quali righe devono essere nascoste (un antenato è collassato)
  const tbl=document.getElementById('rpt-tbl'); if(!tbl) return;
  tbl.querySelectorAll('tr[data-nid],tr[data-acc]').forEach(tr=>{
    // Risali la catena dei data-parent
    let cur=tr.dataset.par||'';
    let hidden=false;
    while(cur) {
      if(rptCollapsed.has(cur)){hidden=true;break;}
      const parent=tbl.querySelector(`tr[data-nid="${CSS.escape(cur)}"]`);
      cur=parent?.dataset.par||'';
    }
    tr.classList.toggle('r-hidden',hidden);
  });
  // Aggiorna triangoli
  tbl.querySelectorAll('[data-tog]').forEach(el=>{
    el.textContent=rptCollapsed.has(el.dataset.tog)?'▶':'▼';
  });
}

function rRptTable() {
  // Salva posizione scroll prima di ricostruire
  const _scr = document.getElementById('rpt-scroll');
  const _scrollTop  = _scr ? _scr.scrollTop  : 0;
  const _scrollLeft = _scr ? _scr.scrollLeft : 0;
  const struct  = rptType==='civ' ? S.civile : S.corporate;
  const mapKey  = rptType==='civ' ? 'civ' : 'corp';
  const selBils = S.bilanci.filter(b=>rptPeriods.includes(b.period));
  // Ultimo periodo per semaforo riconciliazione
  const _lastP = S.bilanci.length ? S.bilanci[S.bilanci.length-1].period : null;
  function _reconLight(nid) {
    if (!_lastP) return '';
    const key = nid+'::'+ _lastP;
    const voci = S.recon[key];
    if (!voci || !voci.length) return ''; // nessuna voce = niente semaforo
    const bilLast = S.bilanci.find(b=>b.period===_lastP);
    const saldo = bilLast ? getBalanceYTD(bilLast, nid) : 0;
    const tot = voci.reduce((s,v)=>s+(v.segno==='+'?1:-1)*(v.importo||0), 0);
    const inQ = Math.abs(saldo - tot) < 0.005;
    const scarto = inQ ? '' : ' Scarto: '+fmt(saldo-tot);
    return `<span onclick="event.stopPropagation();goRecon('${esc(nid)}')" title="${inQ?'Riconciliazione OK':'Non quadra'+scarto}" style="cursor:pointer;font-size:13px;line-height:1;flex-shrink:0;margin-left:4px">${inQ?'🟢':'🔴'}</span>`;
  }
  const tbl = document.getElementById('rpt-tbl');

  // Quarter fiscale: Q1=Apr-Giu, Q2=Lug-Set, Q3=Ott-Dic, Q4=Gen-Mar
  // Restituisce {fy, q} per un period string 'YYYY-MM-...' 
  function bilQuarter(period) {
    const [y,m] = periodYM(period).split('-').map(Number);
    const fy = m>=4?y:y-1;
    const mOff = m>=4?m-4:m+8; // 0=apr,1=mag,...,11=mar
    const q = Math.floor(mOff/3)+1; // 1..4
    return {fy, q};
  }
  function qLabel(fy,q){
    const ends={1:'Giu',2:'Set',3:'Dic',4:'Mar'};
    const endY=q===4?fy+1:fy;
    return `Q${q} ${fy}/${String(fy+1).slice(2)} (al ${ends[q]} ${endY})`;
  }

  // Colonne effettive: mesi singoli o quarters aggregati
  // Ogni colonna ha {label, bils:[...bilanci], isQ:bool}
  const cols = (() => {
    if(!rptGroupQ) return selBils.map(b=>({label:b.period, bils:[b], isQ:false}));
    // Raggruppa per (fy,q), mantieni ordine cronologico
    const groups=new Map();
    selBils.forEach(b=>{
      const {fy,q}=bilQuarter(b.period);
      const k=`${fy}-Q${q}`;
      if(!groups.has(k)) groups.set(k,{fy,q,bils:[]});
      groups.get(k).bils.push(b);
    });
    return [...groups.values()].map(({fy,q,bils})=>({label:qLabel(fy,q), bils, isQ:true}));
  })();

  // colVal: valore di una colonna per un conto/nodo
  // YTD quarter = saldo dell'ultimo mese del quarter disponibile
  // PTD quarter = somma dei PTD mensili del quarter
  function colNodeTotal(col, nodeId) {
    if(!col.isQ || rptMode==='ptd') {
      // PTD: somma movimenti di tutti i mesi del quarter
      // singolo mese: valore diretto
      return col.bils.reduce((s,b)=>s+nodeTotal(struct,S.mapping,mapKey,b,nodeId,rptMode),0);
    }
    // YTD quarter: saldo dell'ultimo mese disponibile nel quarter
    const last=col.bils[col.bils.length-1];
    return nodeTotal(struct,S.mapping,mapKey,last,nodeId,'ytd');
  }
  function colBalance(col, accountId) {
    if(!col.isQ || rptMode==='ptd') {
      return col.bils.reduce((s,b)=>s+getBalance(b,accountId,rptMode),0);
    }
    const last=col.bils[col.bils.length-1];
    return getBalanceYTD(last,accountId);
  }
  if (!tbl) return;

  if (!struct.length) {
    tbl.innerHTML=`<tr><td colspan="99" style="padding:28px;text-align:center;color:#a8a29e">
      Struttura ${rptType==='civ'?'Civile':'Corporate'} non caricata — vai su Strutture.</td></tr>`;
    rRptKPI(struct,mapKey,selBils); return;
  }
  if (!selBils.length) {
    tbl.innerHTML=`<tr><td colspan="99" style="padding:28px;text-align:center;color:#a8a29e">Nessun periodo selezionato.</td></tr>`;
    rRptKPI(struct,mapKey,selBils); return;
  }

  const ncols=2+cols.length;
  function colHdr(col){
    if(col.isQ) {
      const modeL=rptMode==='ytd'?'YTD':'PTD somma';
      return `${esc(col.label)}<br><span style="font-weight:400;font-size:9px;opacity:.45">${modeL}</span>`;
    }
    const b=col.bils[0];
    if(rptMode==='ytd') return `${esc(b.period)}<br><span style="font-weight:400;font-size:9px;opacity:.45">YTD · AF ${esc(fiscalYearStart(b.period))}</span>`;
    const pv=prevBilancio(b);
    return `${esc(b.period)}<br><span style="font-weight:400;font-size:9px;opacity:.45">PTD vs ${pv?esc(periodYM(pv.period)):'ini AF'}</span>`;
  }
  const thead=`<thead><tr>
    <th style="text-align:left;min-width:100px;position:sticky;left:0;z-index:3;background:#f8fafc">Codice</th>
    <th style="text-align:left;min-width:180px;position:sticky;left:100px;z-index:3;background:#f8fafc">Voce</th>
    ${cols.map(c=>`<th style="min-width:120px">${colHdr(c)}</th>`).join('')}
    <th style="min-width:150px;text-align:left;color:#64748b;font-size:10px">Note / ⚖</th>
  </tr></thead>`;

  const rows=[];

  function addNode(node, parentId) {
    const ch    = kids(struct,node.id);
    const lv    = depth(struct,node.id);
    const cls   = lv===0?'r-sec':lv===1?'r-grp':'r-nod';
    const pad   = lv*14+6;
    const bals  = cols.map(c=>colNodeTotal(c,node.id));
    const kD=mapKey==='civ'?'civD':'corpD', kC=mapKey==='civ'?'civC':'corpC';
    const hasKids= ch.length>0 || (rptExpand && S.coa.some(a=>{
      const m2=S.mapping[a.id]; if(!m2) return false;
      return resolveNode(struct,m2[kD])===node.id||resolveNode(struct,m2[kC])===node.id;
    }));
    const isColl = rptCollapsed.has(node.id);
    const tog   = hasKids
      ? `<span data-tog="${esc(node.id)}" onclick="event.stopPropagation();toggleCollapse('${esc(node.id)}')"
           style="display:inline-block;width:12px;font-size:9px;cursor:pointer;opacity:.6;flex-shrink:0">${isColl?'▶':'▼'}</span>`
      : `<span style="display:inline-block;width:12px"></span>`;
    const hidden = parentId && isAncestorCollapsed(parentId);

    // Stile cella per livello
    const codeColor = lv===0?'#3b82f6':lv===1?'#64748b':'#94a3b8';
    const codeSz    = lv===0?'12':lv===1?'11':'11';
    const valSz     = lv===0?'16':lv===1?'14':'13';
    const valFw     = lv===0?'800':lv===1?'600':'500';
    rows.push(`<tr class="${cls}${hidden?' r-hidden':''}" data-nid="${esc(node.id)}" data-par="${esc(parentId||'')}"
        onclick="toggleCollapse('${esc(node.id)}')" style="cursor:${hasKids?'pointer':'default'}">
      <td style="padding-left:${pad}px;position:sticky;left:0;z-index:1;background:var(--row-bg,#fff)">
        <span style="display:inline-flex;align-items:center;gap:3px">
          ${tog}<span style="font-family:monospace;font-size:${codeSz}px;color:${codeColor}">${esc(node.id.length>20?node.id.slice(0,18)+'…':node.id)}</span>
        </span>
      </td>
      <td style="position:sticky;left:100px;z-index:1;background:var(--row-bg,#fff)">${esc(node.name)}</td>
      ${bals.map(v=>`<td class="${cn(v)}" style="font-family:monospace;font-size:${valSz}px;font-weight:${valFw}">${v!==0?fmt(v):'—'}</td>`).join('')}
      <td></td>
    </tr>`);

    // Conti diretti (se espanso)
    if(rptExpand) {
      S.coa.forEach(a=>{
        const m2=S.mapping[a.id]; if(!m2) return;
        const kD=mapKey==='civ'?'civD':'corpD', kC=mapKey==='civ'?'civC':'corpC';
        const r1=resolveNode(struct,m2[kD]), r2=resolveNode(struct,m2[kC]);
        if(r1!==node.id && r2!==node.id) return;
        const aBals=cols.map(c=>colBalance(c,a.id));
        if(!aBals.some(v=>v!==0)) return;
        const hAcc = isColl || hidden;
        rows.push(`<tr class="r-acc${hAcc?' r-hidden':''}" data-acc="1" data-par="${esc(node.id)}">
          <td style="padding-left:${pad+22}px;font-family:monospace;font-size:12px;color:#94a3b8;position:sticky;left:0;z-index:1;background:var(--row-bg,#fff)">${esc(a.id)}</td>
          <td style="font-size:12px;color:#64748b;position:sticky;left:100px;z-index:1;background:var(--row-bg,#fff)">${esc(a.name)}</td>
          ${aBals.map(v=>`<td class="${cn(v)}" style="font-family:monospace;font-size:12px">${v!==0?fmt(v):'—'}</td>`).join('')}
          <td style="padding:2px 6px;white-space:nowrap" onclick="event.stopPropagation()">
            <span style="display:inline-flex;align-items:center;gap:4px">
              <input type="text" value="${esc(S.notes[a.id]||'')}"
                oninput="S.notes['${esc(a.id)}']=this.value;save()"
                placeholder="nota…"
                style="width:110px;font-size:10px;padding:2px 5px;border:1px solid #e2e8f0;border-radius:4px;background:transparent;color:#334155"
                onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#e2e8f0'">
              <button title="Riconciliazione" onclick="event.stopPropagation();goRecon('${esc(a.id)}')"
                style="background:none;border:none;cursor:pointer;font-size:13px;color:#bfdbfe;padding:1px 4px;border-radius:3px"
                onmouseenter="this.style.color='#3b82f6';this.style.background='#eff6ff'"
                onmouseleave="this.style.color='#bfdbfe';this.style.background='none'">⚖</button>
              ${_reconLight(a.id)}
            </span>
          </td>
        </tr>`);
      });
    }

    ch.forEach(c=>addNode(c,node.id));
  }

  function isAncestorCollapsed(pid) {
    let cur=pid;
    while(cur) {
      if(rptCollapsed.has(cur)) return true;
      const p=struct.find(n=>n.id===cur);
      cur=p?.parentId||'';
    }
    return false;
  }

  struct.filter(n=>!n.parentId).forEach(n=>addNode(n,null));

  // Conti non mappati con saldo
  const unm=S.coa.filter(a=>{
    const m2=S.mapping[a.id]; if(!m2) return true;
    const kD2=mapKey==='civ'?'civD':'corpD', kC2=mapKey==='civ'?'civC':'corpC';
    return !resolveNode(struct,m2[kD2])&&!resolveNode(struct,m2[kC2]);
  });
  const unmBal=unm.filter(a=>cols.some(c=>colBalance(c,a.id)!==0));
  if(unmBal.length){
    const tots=cols.map(c=>unmBal.reduce((s,a)=>s+colBalance(c,a.id),0));
    const uc=rptCollapsed.has('__um__');
    rows.push(`<tr class="r-sec" data-nid="__um__" data-par="" onclick="toggleCollapse('__um__')" style="cursor:pointer;background:#fef2f2">
      <td colspan="2" style="padding:4px 8px;color:#991b1b">
        <span style="display:inline-flex;align-items:center;gap:4px">
          <span data-tog="__um__" style="font-size:9px;width:12px">${uc?'▶':'▼'}</span>
          <span style="font-size:11px;font-weight:600">⚠ Non mappati (${unmBal.length})</span>
        </span>
      </td>
      ${tots.map(v=>`<td class="neg" style="font-family:monospace;font-weight:700">${fmt(v)}</td>`).join('')}
    </tr>`);
    unmBal.forEach(a=>{
      const aBals=cols.map(c=>colBalance(c,a.id));
      rows.push(`<tr class="r-acc${uc?' r-hidden':''}" data-acc="1" data-par="__um__" style="background:#fff5f5">
        <td style="padding-left:20px;font-family:monospace;font-size:9px;color:#dc2626">${esc(a.id)}</td>
        <td style="font-size:10px;color:#991b1b">${esc(a.name)}</td>
        ${aBals.map(v=>`<td class="neg" style="font-family:monospace;font-size:10px">${v!==0?fmt(v):'—'}</td>`).join('')}
      </tr>`);
    });
  }

  // ── Totali SP, CE, Quadratura ──────────────────────────
  function nodeTotCols(nodeHints) {
    const n = nodeHints.reduce((found, hint) => {
      if (found) return found;
      return struct.find(nd=>nd.id===hint||nd.id.startsWith(hint+' ')||nd.id.startsWith(hint+'-'));
    }, null);
    if (!n) return null;
    return cols.map(col => {
      const bils = col.bils;
      if (!col.isQ || rptMode==='ptd') {
        return bils.reduce((s,b)=>s+nodeTotal(struct,S.mapping,mapKey,b,n.id,rptMode),0);
      }
      const last = bils[bils.length-1];
      return nodeTotal(struct,S.mapping,mapKey,last,n.id,rptMode);
    });
  }

  const totA = nodeTotCols(['A']);
  const totB = nodeTotCols(['B']);
  const totC = nodeTotCols(['C']);
  const totD = nodeTotCols(['D']);
  const totE = nodeTotCols(['E']);

  // Totale SP = A+B+C (solo se almeno uno trovato)
  const hasSP = totA||totB||totC;
  const hasCE = totD||totE;
  if (hasSP) {
    const spTot = cols.map((_,i)=>(totA?totA[i]:0)+(totB?totB[i]:0)+(totC?totC[i]:0));
    rows.push(`<tr style="background:#f0fdf4;font-weight:700">
      <td colspan="2" style="padding-left:14px;position:sticky;left:0;z-index:1;background:#f0fdf4;border-top:2px solid #86efac;border-bottom:1px solid #bbf7d0">
        <span style="opacity:.5;font-size:9px;margin-right:6px;font-family:monospace">=</span>
        Totale Stato Patrimoniale (A+B+C)
      </td>
      ${spTot.map(v=>`<td class="${cn(v)}" style="font-family:monospace;font-size:13px;font-weight:700;border-top:2px solid #86efac;border-bottom:1px solid #bbf7d0">${fmt(v)}</td>`).join('')}
      <td style="border-top:2px solid #86efac"></td>
    </tr>`);
  }
  if (hasCE) {
    const ceTot = cols.map((_,i)=>(totD?totD[i]:0)+(totE?totE[i]:0));
    rows.push(`<tr style="background:#eff6ff;font-weight:700">
      <td colspan="2" style="padding-left:14px;position:sticky;left:0;z-index:1;background:#eff6ff;border-top:2px solid #93c5fd;border-bottom:1px solid #bfdbfe">
        <span style="opacity:.5;font-size:9px;margin-right:6px;font-family:monospace">=</span>
        Totale Conto Economico (D+E)
      </td>
      ${ceTot.map(v=>`<td class="${cn(v)}" style="font-family:monospace;font-size:13px;font-weight:700;border-top:2px solid #93c5fd;border-bottom:1px solid #bfdbfe">${fmt(v)}</td>`).join('')}
      <td style="border-top:2px solid #93c5fd"></td>
    </tr>`);
    if (hasSP) {
      const spTot = cols.map((_,i)=>(totA?totA[i]:0)+(totB?totB[i]:0)+(totC?totC[i]:0));
      const quadTot = cols.map((_,i)=>spTot[i]+ceTot[i]);
      rows.push(`<tr style="background:#fefce8;font-weight:800">
        <td colspan="2" style="padding-left:14px;position:sticky;left:0;z-index:1;background:#fefce8;border-top:2px solid #fde047;border-bottom:2px solid #fde047">
          <span style="opacity:.5;font-size:9px;margin-right:6px;font-family:monospace">=</span>
          Totale a quadratura (SP+CE)
        </td>
        ${quadTot.map(v=>`<td class="${cn(v)}" style="font-family:monospace;font-size:14px;font-weight:800;border-top:2px solid #fde047;border-bottom:2px solid #fde047">${fmt(v)}</td>`).join('')}
        <td style="border-top:2px solid #fde047"></td>
      </tr>`);
    }
  }

  tbl.innerHTML=thead+`<tbody>${rows.join('')}</tbody>`;
  requestAnimationFrame(()=>{if(_scr){_scr.scrollTop=_scrollTop;_scr.scrollLeft=_scrollLeft;}});
  rRptKPI(struct,mapKey,selBils);
}

// KPI: Magazzino, Cassa netta (senza 1603), Fatturato (solo 4001), Marketing (5202)
function rRptKPI(struct, mapKey, selBils) {
  // KPI spostati in Dashboard
  return;

  function fn(...hints) { // findNode
    for(const h of hints){
      const lo=h.toLowerCase();
      let n=struct.find(n=>n.id.toLowerCase()===lo||n.id.toLowerCase().startsWith(lo+' -')||n.id.toLowerCase().startsWith(lo+' '));
      if(n) return n;
      n=struct.find(n=>n.id.toLowerCase().includes(lo)||n.name.toLowerCase().includes(lo));
      if(n) return n;
    }
    return null;
  }

  function cassaTot(b) {
    const nd=fn("16 - disponibilit","disponibilit"); if(!nd) return null;
    const ex=fn('1603'); const exIds=ex?new Set([ex.id,...descendants(struct,ex.id)]):new Set();
    const scope=new Set([nd.id,...descendants(struct,nd.id)].filter(x=>!exIds.has(x)));
    const kD3=mapKey==='civ'?'civD':'corpD', kC3=mapKey==='civ'?'civC':'corpC';
    return S.coa.reduce((s,a)=>{
      const bal=getBalance(b,a.id,rptMode);
      const raw=bal>=0?(S.mapping[a.id]?.[kD3]||S.mapping[a.id]?.[kC3]):(S.mapping[a.id]?.[kC3]||S.mapping[a.id]?.[kD3]);
      const t=resolveNode(struct,raw);
      return (t&&scope.has(t))?s+bal:s;
    },0);
  }

  const defs=[
    {ic:'🏭',label:'Magazzino',   f:(b)=>{ const n=fn('1201','magazzino'); return n?nodeTotal(struct,S.mapping,mapKey,b,n.id,rptMode):null; }},
    {ic:'💵',label:'Cassa netta', f:cassaTot, note:'escluso nodo 1603'},
    {ic:'📈',label:'Fatturato',   f:(b)=>{ const n=fn('4001'); return n?nodeTotal(struct,S.mapping,mapKey,b,n.id,rptMode):null; }, note:'nodo 4001'},
    {ic:'📣',label:'Marketing',   f:(b)=>{ const n=fn('5202'); return n?nodeTotal(struct,S.mapping,mapKey,b,n.id,rptMode):null; }, note:'nodo 5202'},
  ];

  const kpis=defs.map(d=>{
    const vals=selBils.map(b=>d.f(b));
    if(vals.every(v=>v===null)) return null;
    return {...d, vals:vals.map(v=>v??0)};
  }).filter(Boolean);

  if(!kpis.length){el.innerHTML='';return;}

  el.innerHTML=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
    ${kpis.map(k=>`<div style="flex:1;min-width:130px;background:#fff;border:1px solid #e7e5e4;border-radius:9px;padding:8px 11px">
      <p style="font-size:11px;font-weight:600">${k.ic} ${k.label}${k.note?` <span style="font-size:9px;color:#a8a29e;font-weight:400">${esc(k.note)}</span>`:''}</p>
      ${k.vals.map((v,i)=>`<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:3px">
        <span style="color:#78716c;font-size:10px">${esc(selBils[i].period)}</span>
        <span class="${cn(v)}" style="font-family:monospace;font-weight:700">${fmt(v)}</span>
      </div>`).join('')}
    </div>`).join('')}
  </div>`;
}

function expRptCSV() {
  const struct=rptType==='civ'?S.civile:S.corporate;
  const mapKey=rptType==='civ'?'civ':'corp';
  const selBils=S.bilanci.filter(b=>rptPeriods.includes(b.period));
  const rows=[['Tipo','Nodo ID','Nodo Nome','Conto ID','Conto Nome','Periodo','Saldo'].join(';')];
  selBils.forEach(b=>{
    S.coa.forEach(a=>{
      const m2=S.mapping[a.id]; if(!m2) return;
      const kD2=mapKey==='civ'?'civD':'corpD', kC2=mapKey==='civ'?'civC':'corpC';
      const bal=getBalance(b,a.id,rptMode);
      const raw=bal>=0?(m2[kD2]||m2[kC2]):(m2[kC2]||m2[kD2]); if(!raw) return;
      const resolved=resolveNode(struct,raw); if(!resolved) return;
      const node=struct.find(n=>n.id===resolved); if(!node) return;
      const v=getBalance(b,a.id,rptMode);
      if(v!==0) rows.push([rptType,node.id,node.name,a.id,a.name,b.period,v].map(x=>'"'+String(x||'').replace(/"/g,'""')+'"').join(';'));
    });
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(rows.join('\n'));
  a.download=`report_${rptType}_${rptMode}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── ALLEGATI PDF ────────────────────────────────────────────
function _reconAttachKey() {
  return ((reconNodeId||'')+'::'+reconPeriod).replace(/[^a-zA-Z0-9_-]/g,'_');
}

async function loadReconAttachments() {
  const el = document.getElementById('recon-attachments');
  if (!el) return;
  if (!window._fbGetAttachments) {
    el.innerHTML = '<p style="color:#a8a29e;font-size:12px;text-align:center;padding:8px 0">Firebase non disponibile.</p>';
    return;
  }
  const files = await window._fbGetAttachments(_reconAttachKey());
  renderAttachments(files);
}

function renderAttachments(files) {
  const el = document.getElementById('recon-attachments');
  if (!el) return;
  if (!files || !files.length) {
    el.innerHTML = '<p style="color:#a8a29e;font-size:12px;text-align:center;padding:8px 0">Nessun allegato.</p>';
    return;
  }
  el.innerHTML = files.map((f,i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #f1f5f9">
      <span style="font-size:18px;flex-shrink:0">📄</span>
      <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(f.name)}">${esc(f.name)}</span>

async function uploadReconPDF(inp) {
  const files = Array.from(inp.files);
  if (!files.length) return;
  if (!window._fbUploadPDF) { showMsg('msg-attach','err','Firebase Storage non disponibile.'); return; }
  const el = document.getElementById('recon-attachments');
  showMsg('msg-attach','ok','⏳ Caricamento in corso...');
  try {
    const key = _reconAttachKey();
    const existing = await window._fbGetAttachments(key);
    const uploaded = [];
    for (const file of files) {
      if (file.type !== 'application/pdf') { showMsg('msg-attach','err','Solo file PDF.'); continue; }
      if (file.size > 10 * 1024 * 1024) { showMsg('msg-attach','err',file.name+' supera 10MB.'); continue; }
      const meta = await window._fbUploadPDF(key, file);
      uploaded.push(meta);
    }
    const allFiles = [...existing, ...uploaded];
    await window._fbSaveAttachments(key, allFiles);
    renderAttachments(allFiles);
    showMsg('msg-attach','ok','✓ '+uploaded.length+' PDF allegati.');
  } catch(e) { showMsg('msg-attach','err','Errore: '+e.message); }
  inp.value = '';
}

async function deleteReconPDF(idx) {
  if (!confirm('Eliminare questo allegato?')) return;
  if (!window._fbDeletePDF) return;
  try {
    const key = _reconAttachKey();
    const files = await window._fbGetAttachments(key);
    const f = files[idx];
    await window._fbDeletePDF(f.path);
    files.splice(idx, 1);
    await window._fbSaveAttachments(key, files);
    renderAttachments(files);
    showMsg('msg-attach','ok','✓ Allegato eliminato.');
  } catch(e) { showMsg('msg-attach','err','Errore: '+e.message); }
}

document.addEventListener('paste', function(e) {
  if (page !== 'recon') return;

  const tag = document.activeElement?.tagName;
  if (tag==='INPUT'||tag==='TEXTAREA') return;

});

// Parsa testo tab-separated e inserisce le voci
function parseAndInsertPaste(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  if (!lines.length) { showMsg('msg-recon','err','Nessun dato da incollare.'); return; }
  // Rileva se prima riga è header (contiene "desc" o "import" o "segno")
  const first = lines[0].toLowerCase();
  const si = (first.includes('desc')||first.includes('import')||first.includes('segno')||first.includes('note')) ? 1 : 0;
  // Determina separatore (tab o ;)
  const sep = lines[0].includes('\t') ? '\t' : ';';
  const newVoci = [];
  for (let i=si; i<lines.length; i++) {
    const cols = lines[i].split(sep);
    if (!cols.length) continue;
    // Formato: Descrizione [Segno] [Importo]
    // Supporta anche solo 2 colonne: Descrizione | Importo (segno dal segno del numero)
    let desc='', segno='+', importo=0;
    if (cols.length >= 3) {
      desc = cols[0].trim().replace(/^"|"$/g,'');
      const sRaw = cols[1].trim().replace(/^"|"$/g,'');
      segno = (sRaw==='-'||sRaw.toLowerCase()==='dare') ? '-' : '+';
      const aRaw = cols[2].trim().replace(/^"|"$/g,'').replace(/[.\s]/g,'').replace(',','.');
      importo = Math.abs(parseFloat(aRaw)||0);
    } else if (cols.length === 2) {
      desc = cols[0].trim().replace(/^"|"$/g,'');
      const aRaw = cols[1].trim().replace(/^"|"$/g,'').replace(/[.\s]/g,'').replace(',','.');
      const val = parseFloat(aRaw)||0;
      segno = val < 0 ? '-' : '+';
      importo = Math.abs(val);
    } else if (cols.length === 1) {
      const aRaw = cols[0].trim().replace(/^"|"$/g,'').replace(/[.\s]/g,'').replace(',','.');
      const val = parseFloat(aRaw)||0;
      if (!val) continue;
      segno = val < 0 ? '-' : '+';
      importo = Math.abs(val);
    }
    if (importo === 0 && !desc) continue;
    newVoci.push({desc, segno, importo});
  }
  if (!newVoci.length) { showMsg('msg-recon','err','Nessuna voce riconosciuta. Verifica il formato: Descrizione\tSegno\tImporto'); return; }
  const key = (reconNodeId||'')+'::'+reconPeriod;
  if (!S.recon[key]) S.recon[key] = [];
  const before = S.recon[key].length;
  S.recon[key].push(...newVoci);
  save(); rRecon();
  showMsg('msg-recon','ok','✓ '+newVoci.length+' voci incollate'+(before?' (aggiunte a '+before+' esistenti)':'')+'. Totale: '+S.recon[key].length+'.');
}

// Copia voci negli appunti (formato tab-separated per Excel)
function copyReconVoci() {
  const key = (reconNodeId||'') + '::' + reconPeriod;
  const voci = S.recon[key] || [];
  if (!voci.length) { showMsg('msg-recon','err','Nessuna voce da copiare.'); return; }
  const lines = ['Descrizione	Segno	Importo'];
  voci.forEach(v => {
    lines.push([
      (v.desc||'').replace(/	/g,' '),
      v.segno||'+',
      String(v.importo||0).replace('.',',')
    ].join('	'));
  });
  // Aggiungi riga totale
  const tot = voci.reduce((s,v)=>s+(v.segno==='+'?1:-1)*(v.importo||0), 0);
  lines.push(['TOTALE','',String(tot.toFixed(2)).replace('.',',')].join('	'));
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>showMsg('msg-recon','ok','✓ '+voci.length+' voci copiate negli appunti.'))
    .catch(()=>showMsg('msg-recon','err','Errore copia appunti.'));
}

// Importa voci da Excel/CSV
async function importReconVoci(inp) {
  const f = inp.files[0]; if (!f) return;
  try {
    let rows;
    if (f.name.toLowerCase().endsWith('.csv')) {
      rows = parseCSV(await f.text());
    } else {
      const wb = await XLSX.read(await f.arrayBuffer());
      rows = wb.Sheets[wb.SheetNames[0]];
    }
    if (!rows || !rows.length) { showMsg('msg-recon','err','File vuoto.'); return; }
    // Rileva header: desc/descrizione, segno, importo/amount
    const hdr = rows[0].map(c=>String(c||'').toLowerCase().trim());
    const iDesc = hdr.findIndex(c=>c.includes('desc')||c.includes('note')||c.includes('voce')); 
    const iSign = hdr.findIndex(c=>c.includes('segno')||c.includes('sign')||c==='+-'||c==='+/-');
    const iAmt  = hdr.findIndex(c=>c.includes('import')||c.includes('amount')||c.includes('valore'));
    const si = (iDesc>=0||iSign>=0||iAmt>=0) ? 1 : 0; // salta header se trovata
    const dI = iDesc>=0?iDesc:0, sI = iSign>=0?iSign:1, aI = iAmt>=0?iAmt:(si?2:1);
    const newVoci = [];
    for (let i=si; i<rows.length; i++) {
      const r = rows[i]; if (!r || !r[aI]) continue;
      const raw = String(r[aI]||'').replace(/[^\d.,-]/g,'').replace(',','.');
      const amt = parseFloat(raw);
      if (isNaN(amt)) continue;
      const desc = String(r[dI]||'').trim();
      const sRaw = String(r[sI]||'').trim();
      const segno = sRaw==='-'||sRaw.toLowerCase()==='dare'||amt<0 ? '-' : '+';
      newVoci.push({ desc, segno, importo: Math.abs(amt) });
    }
    if (!newVoci.length) { showMsg('msg-recon','err','Nessuna voce trovata nel file.'); inp.value=''; return; }
    const key = (reconNodeId||'') + '::' + reconPeriod;
    if (S.recon[key]?.length) {
      if (!confirm('Sostituire le '+S.recon[key].length+' voci esistenti con '+newVoci.length+' nuove?')) { inp.value=''; return; }
    }
    if (!S.recon[key]) S.recon[key] = [];
    S.recon[key].splice(0, S.recon[key].length, ...newVoci);
    save(); rRecon();
    showMsg('msg-recon','ok','✓ '+newVoci.length+' voci importate.');
  } catch(e) { showMsg('msg-recon','err','Errore: '+e.message); }
  inp.value='';
}

function importState(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      // Valida che abbia almeno le chiavi base
      if (typeof parsed !== 'object' || !parsed.coa) {
        alert('File non valido: manca la struttura attesa.'); return;
      }
      // Merge con BLANK per chiavi mancanti (compatibilità versioni precedenti)
      const merged = { ...BLANK, ...parsed };
      Object.keys(BLANK).forEach(k => { if (!merged[k]) merged[k] = BLANK[k]; });
      S = merged;
      save();
      renderAll();
      alert('✓ Stato importato correttamente.');
    } catch(ex) {
      alert('Errore nel file JSON: ' + ex.message);
    }
    input.value = '';
  };
  reader.readAsText(file, 'utf-8');
}
