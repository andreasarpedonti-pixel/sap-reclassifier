<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SAP Reclassifier</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f4;color:#1c1917;display:flex;height:100vh;overflow:hidden;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#d6d3d1;border-radius:9px}
/* SIDEBAR */
#sb{width:200px;flex-shrink:0;background:#fff;border-right:1px solid #e7e5e4;display:flex;flex-direction:column;height:100vh;transition:width .2s;overflow:hidden}
#sb.col{width:44px}
#sb-top{padding:8px 10px;border-bottom:1px solid #e7e5e4;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#sb-logo{overflow:hidden;flex:1;min-width:0}
#sb-logo h1{font-size:12px;font-weight:700;color:#312e81;white-space:nowrap;transition:opacity .15s}
#sb-logo p{font-size:10px;color:#a8a29e;white-space:nowrap;transition:opacity .15s}
#sb.col #sb-logo h1,#sb.col #sb-logo p{opacity:0}
#sb-tog{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;color:#78716c;font-size:14px;flex-shrink:0;line-height:1;margin-left:4px}
#sb-tog:hover{background:#f5f5f4}
#sb-nav{padding:6px;flex:1;overflow-y:auto;overflow-x:hidden}
.nav-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#78716c;text-align:left;margin-bottom:2px;transition:background .12s;white-space:nowrap;overflow:hidden}
.nav-btn:hover{background:#f5f5f4;color:#1c1917}
.nav-btn.on{background:#eef2ff;color:#4338ca}
.nav-ic{font-size:16px;width:22px;flex-shrink:0;text-align:center}
.nav-lbl{transition:opacity .15s,width .2s;overflow:hidden}
#sb.col .nav-lbl{opacity:0;width:0;pointer-events:none}
#sb.col .nav-btn{justify-content:center;padding:9px 0}
/* MAIN */
#main{flex:1;overflow-y:auto;height:100vh;padding:12px 18px}
.pg{display:none;width:100%}.pg.on{display:block}
/* TYPOGRAPHY */
.h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
.sub{font-size:13px;color:#78716c;margin-top:3px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
/* CARDS */
.card{background:#fff;border:1px solid #e7e5e4;border-radius:14px;overflow:hidden;margin-bottom:16px}
.card-hd{padding:11px 18px;background:#fafaf9;border-bottom:1px solid #e7e5e4;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-bd{padding:18px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:9px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .12s;white-space:nowrap}
.btn-pri{background:#4f46e5;color:#fff}.btn-pri:hover{background:#4338ca}
.btn-sec{background:#fff;color:#44403c;border:1px solid #d6d3d1}.btn-sec:hover{background:#fafaf9}
.btn-del{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:7px}
.btn:disabled{opacity:.4;cursor:not-allowed}
/* INPUTS */
input,select{padding:7px 10px;border:1px solid #d6d3d1;border-radius:8px;font-size:12px;outline:none;background:#fff;width:100%}
input:focus,select:focus{border-color:#6366f1;box-shadow:0 0 0 2px #e0e7ff}
/* ALERTS */
.alert{padding:10px 14px;border-radius:9px;font-size:12px;margin-bottom:10px;line-height:1.5}
.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:#fff;border:1px solid #e7e5e4;border-radius:12px;padding:13px 15px}
.stat-l{font-size:11px;color:#a8a29e;margin-bottom:4px}
.stat-v{font-size:21px;font-weight:700;font-family:monospace}
/* UPLOAD */
.upz{border:2px dashed #d6d3d1;border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:10px}
.upz:hover{border-color:#6366f1;background:#eef2ff}
/* TABS */
.tabs{display:flex;gap:3px;padding:3px;background:#f5f5f4;border-radius:9px;margin-bottom:14px}
.tab{flex:1;padding:6px 10px;border:none;background:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:#78716c;transition:all .12s}
.tab.on{background:#fff;color:#4338ca;box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* TABLE generic */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#78716c;background:#fafaf9;padding:8px 10px;text-align:left;border-bottom:1px solid #e7e5e4}
.tbl td{padding:6px 10px;border-bottom:1px solid #f5f5f4}
.tbl tr:hover td{background:#fafaf9}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:11px}
/* STRUCT TREE */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;min-height:0}
.sbox{border:1px solid #e7e5e4;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;flex:1;min-height:0}
.sbox-hd{padding:12px 16px;font-size:14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #e7e5e4}
.sbox-add{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid #e7e5e4;flex-shrink:0}
.sbox-bd{flex:1;overflow-y:auto;padding:10px 14px;font-size:14px}
.sn{border-bottom:1px solid #f5f5f4}
.sr{display:flex;align-items:center;padding:5px 8px;gap:4px}
.sr:hover{background:#fafaf9}
.sr:hover .sa{display:flex}
.sa{display:none;gap:2px;flex-shrink:0}
.ib{background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px;font-size:12px}
.ib:hover{background:#e7e5e4}
/* MAPPING TABLE */
.mt{border:1px solid #e7e5e4;border-radius:12px;overflow:hidden}
.mh,.mr{display:grid;grid-template-columns:24px 110px 1fr 150px 150px 150px 150px;align-items:center;min-height:38px}
.mh{background:#fafaf9;border-bottom:1px solid #e7e5e4;font-size:12px;font-weight:600;text-transform:uppercase;color:#78716c}
.mh>div,.mr>div{padding:6px 8px}
.mr{border-bottom:1px solid #f5f5f4}
.mr:hover>div{background:#fafaf9}
.mb{max-height:calc(100vh - 360px);overflow-y:auto}
/* SELECT DROPDOWN */
.sw{position:relative}
.sb2{width:100%;padding:3px 7px;border:1px solid #d6d3d1;border-radius:6px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:#fff;text-align:left;gap:3px}
.sb2.cv{background:#f0fdf4;border-color:#86efac;color:#14532d}
.sd{position:absolute;z-index:300;top:calc(100% + 2px);left:0;min-width:280px;background:#fff;border:1px solid #e7e5e4;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.15);overflow:hidden}
.sd input{width:100%;padding:7px 9px;border:none;border-bottom:1px solid #f5f5f4;font-size:11px;outline:none}
.sl{max-height:220px;overflow-y:auto;padding:3px}
.so{padding:5px 9px;border-radius:5px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:5px}
.so:hover{background:#f5f5f4}
.so.sel{background:#dcfce7;color:#14532d}
.print-header{display:none}
.print-header h2{font-size:15px;font-weight:700;margin:0 0 2px 0;color:#1e3a6e}
.print-header p{font-size:11px;color:#64748b;margin:0}
.print-header hr{border:none;border-top:1px solid #bfdbfe;margin:6px 0 10px 0}
/* REPORT */
.rpt-tbl{width:100%;border-collapse:collapse;font-size:14px}
.rpt-tbl th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#6b7280;padding:7px 12px;background:#f8f8f7;border-bottom:2px solid #e2e8f0;white-space:nowrap;text-align:right;position:sticky;top:0;z-index:2;font-weight:600}
.rpt-tbl th:first-child,.rpt-tbl th:nth-child(2){text-align:left}
.rpt-tbl td{padding:4px 12px;border-bottom:1px solid #f1f5f9;text-align:right;white-space:nowrap}
.rpt-tbl td:first-child{text-align:left;white-space:nowrap}
.rpt-tbl td:nth-child(2){text-align:left}

/* LV0 — SEZIONE: nessuno sfondo, solo separatore e bordo sinistro blu */
.r-sec>td{
  background:#fff;
  color:#0f172a;
  font-weight:800;
  font-size:16px;
  border-top:2px solid #3b82f6;
  border-bottom:1px solid #e2e8f0;
  padding-top:9px;
  padding-bottom:9px;
}
.r-sec>td:first-child{border-left:4px solid #3b82f6;padding-left:10px}
.r-sec:hover>td{background:#f0f7ff!important}

/* LV1 — GRUPPO: sfondo grigio leggerissimo, corsivo, bordo sinistra blu chiaro */
.r-grp>td{
  background:#f8fafc;
  color:#1e293b;
  font-weight:600;
  font-style:italic;
  font-size:14px;
  border-bottom:1px solid #e2e8f0;
}
.r-grp>td:first-child{border-left:3px solid #93c5fd;padding-left:10px}
.r-grp:hover>td{background:#eff6ff!important}

/* LV2 — NODO: bianco, testo medio, bordo sinistra grigio */
.r-nod>td{
  background:#fff;
  color:#334155;
  font-weight:500;
  font-size:12px;
  border-bottom:1px solid #f1f5f9;
}
.r-nod>td:first-child{border-left:2px solid #cbd5e1;padding-left:10px}
.r-nod:hover>td{background:#f8fafc!important}

/* CONTO ANALITICO: testo piccolo, grigio, nessun bordo */
.r-acc>td{
  background:#fff;
  color:#111827;
  font-size:10px;
  font-weight:400;
  border-bottom:none;
}
.r-acc:hover>td{background:#f8fafc!important}

/* TOTALI UTILE */
.r-utile-ai>td{
  background:#fff;
  color:#0369a1;
  font-weight:700;
  font-style:italic;
  font-size:14px;
  border-top:2px solid #bae6fd;
  border-bottom:1px solid #e0f2fe;
  padding-top:7px;padding-bottom:7px;
}
.r-utile-ai>td:first-child{border-left:4px solid #38bdf8;padding-left:10px}
.r-utile-ai:hover>td{background:#f0f9ff!important}

.r-utile-netto>td{
  background:#fff;
  color:#0f172a;
  font-weight:800;
  font-size:16px;
  border-top:2px solid #3b82f6;
  border-bottom:2px solid #3b82f6;
  padding-top:9px;padding-bottom:9px;
}
.r-utile-netto>td:first-child{border-left:4px solid #1d4ed8;padding-left:10px}
.r-utile-netto:hover>td{background:#f0f7ff!important}

/* NUMERI: nero=dare, rosso=avere */
.neg{color:#dc2626!important;font-style:normal}
.pos{color:#111827!important}
.zero{color:#9ca3af!important}
/* PROGRESS */
.bar{height:5px;background:#e7e5e4;border-radius:99px;overflow:hidden;margin:4px 0}
.bar-f{height:100%;border-radius:99px}
/* TOGGLE BTN active/inactive — due classi esplicite, nessun !important trick */
.btn-on{background:#4338ca;color:#fff;border:1px solid #4338ca}
.btn-on:hover{background:#3730a3;border-color:#3730a3}
.btn-off{background:#fff;color:#44403c;border:1px solid #d6d3d1}
.btn-off:hover{background:#fafaf9}
/* REPORT page full width */
#pg-report{max-width:none!important;padding:0!important}
/* REPORT outer: occupa tutto lo schermo meno il padding del main */
#rpt-outer{display:flex;flex-direction:column;height:calc(100vh - 32px);gap:6px}
#rpt-controls{flex-shrink:0;padding:8px 0 0 0}
#rpt-kpi-wrap{flex-shrink:0}
#rpt-scroll{flex:1;min-height:0;overflow:auto;border:1px solid #e7e5e4;border-radius:10px}
#rpt-tbl{border-collapse:collapse}
/* Sticky col shadow */
#rpt-tbl td:nth-child(2)[style*="sticky"],
#rpt-tbl th:nth-child(2)[style*="sticky"]{box-shadow:3px 0 6px -2px rgba(0,0,0,.12)}
/* Row background vars */
.r-sec{--row-bg:#e0f2fe}
.r-grp{--row-bg:#f0f9ff}
.r-nod{--row-bg:#fff}
.r-acc{--row-bg:#fafaf9}
tr:hover{--row-bg:#fef9c3!important}
/* Collasso: .r-hidden nasconde una riga */
.r-hidden{display:none!important}
/* Cursore sui nodi con figli */
.r-has-kids>td:nth-child(2){cursor:pointer}
.r-has-kids:hover>td{background:rgba(99,102,241,.05)!important}
/* PRINT */
@media print{
  .print-header{display:block!important}
  #sb,#rpt-controls,#rpt-kpi-wrap,.no-print{display:none!important}
  #main{padding:4px!important;height:auto!important;overflow:visible!important}
  #pg-report,#rpt-outer{height:auto!important;display:block!important}
  #rpt-scroll{overflow:visible!important;height:auto!important;border:none!important}
  .rpt-tbl td,.rpt-tbl th{font-size:8px!important;padding:2px 5px!important}
  .neg{color:#c00!important}
  .pos{color:#000!important}
  .r-sec>td{border-top:2px solid #3b82f6!important;font-weight:800!important}
  .r-grp>td{background:#f8fafc!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .r-utile-netto>td{border-top:2px solid #000!important;font-weight:800!important}
  @page{margin:.8cm;size:landscape}
}
#sb.#sb-io{padding:10px 8px;border-top:1px solid #e7e5e4;display:flex;flex-direction:column;gap:6px;flex-shrink:0;margin-top:auto}
#sb.col #sb-io{display:none}
.hidden{display:none}
.note-cell input{transition:border-color .15s}
.note-cell input:focus{outline:none;border-color:#3b82f6!important;background:#fff!important}
@media print{.note-cell{display:none!important}}
</style>
<!-- Firebase SDK -->
<script type="module" id="fb-module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject, listAll } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const _fbConfig = {
  apiKey: "AIzaSyB4wW9n5kkPq2TkaYjFxWZxzrNHOUft0sI",
  authDomain: "sap-reclassifier.firebaseapp.com",
  projectId: "sap-reclassifier",
  storageBucket: "sap-reclassifier.firebasestorage.app",
  messagingSenderId: "222721257428",
  appId: "1:222721257428:web:87bbeb7b66ed740b813041"
};

const _fbApp  = initializeApp(_fbConfig);
const _db     = getFirestore(_fbApp);
const _docRef = doc(_db, 'state', 'main');

// Esponi funzioni al contesto globale
window._fbSave = async (data) => {
  try {
    await setDoc(_docRef, { payload: JSON.stringify(data), ts: Date.now() });
    window._fbSetStatus('sync');
  } catch(e) {
    console.error('Firebase save error:', e);
    window._fbSetStatus('err');
  }
};

window._fbLoad = async () => {
  try {
    const snap = await getDoc(_docRef);
    if (snap.exists()) {
      const raw = snap.data().payload;
      return raw ? JSON.parse(raw) : null;
    }
    return null;
  } catch(e) {
    console.error('Firebase load error:', e);
    return null;
  }
};

// Listener real-time: aggiorna se cambia da altro dispositivo
let _fbIgnoreNext = false;
onSnapshot(_docRef, (snap) => {
  if (!snap.exists()) return;
  if (_fbIgnoreNext) { _fbIgnoreNext = false; return; }
  try {
    const remote = JSON.parse(snap.data().payload || '{}');
    const localTs  = parseInt(localStorage.getItem('saprec5_ts') || '0');
    const remoteTs = snap.data().ts || 0;
    if (remoteTs > localTs + 3000) { // remoto più recente di 3s
      window._fbMergeRemote(remote);
      window._fbSetStatus('synced');
    }
  } catch(e) {}
});

const _storage = getStorage(_fbApp);

// Upload PDF attachment for a recon key
window._fbUploadPDF = async (reconKey, file) => {
  const safeName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `attachments/${reconKey}/${safeName}`;
  const storageRef = ref(_storage, path);
  await uploadBytes(storageRef, file, { contentType: 'application/pdf' });
  const url = await getDownloadURL(storageRef);
  return { name: file.name, path, url, uploadedAt: Date.now() };
};

// Delete a PDF attachment
window._fbDeletePDF = async (path) => {
  const storageRef = ref(_storage, path);
  await deleteObject(storageRef);
};

// List attachments for a recon key (from Firestore metadata)
window._fbGetAttachments = async (reconKey) => {
  try {
    const d = await getDoc(doc(_db, 'attachments', reconKey.replace(/[^a-zA-Z0-9_-]/g, '_')));
    return d.exists() ? (d.data().files || []) : [];
  } catch { return []; }
};

// Save attachment metadata to Firestore
window._fbSaveAttachments = async (reconKey, files) => {
  const safeKey = reconKey.replace(/[^a-zA-Z0-9_-]/g, '_');
  await setDoc(doc(_db, 'attachments', safeKey), { files, updatedAt: Date.now() });
};

window._fbReady = true;
window.dispatchEvent(new Event('fb-ready'));
</script>

<script>
// ══════════════════════════════════════════════════════════
// XLSX PARSER (zero dipendenze, usa API browser native)
// ══════════════════════════════════════════════════════════
const XLSX = (() => {
  async function unzip(ab) {
    const v = new DataView(ab), files = {};
    let eo = -1;
    for (let i = ab.byteLength - 22; i >= 0; i--) {
      if (v.getUint32(i, true) === 0x06054b50) { eo = i; break; }
    }
    if (eo < 0) throw new Error('Not a zip');
    const csz = v.getUint32(eo + 12, true), cst = v.getUint32(eo + 16, true);
    let p = cst;
    while (p < cst + csz) {
      if (v.getUint32(p, true) !== 0x02014b50) break;
      const method = v.getUint16(p + 10, true);
      const csz2   = v.getUint32(p + 20, true);
      const usz    = v.getUint32(p + 24, true);
      const fnl    = v.getUint16(p + 28, true);
      const exl    = v.getUint16(p + 30, true);
      const cml    = v.getUint16(p + 32, true);
      const lho    = v.getUint32(p + 42, true);
      const name   = new TextDecoder().decode(new Uint8Array(ab, p + 46, fnl));
      p += 46 + fnl + exl + cml;
      const lhex = v.getUint16(lho + 28, true);
      const ds   = lho + 30 + fnl + lhex;
      const cd   = new Uint8Array(ab, ds, csz2);
      if (method === 0) { files[name] = cd.slice(); }
      else if (method === 8) {
        try {
          const s = new DecompressionStream('deflate-raw');
          const w = s.writable.getWriter(); w.write(cd); w.close();
          const chunks = []; const r = s.readable.getReader();
          while (true) { const {done,value} = await r.read(); if(done)break; chunks.push(value); }
          const out = new Uint8Array(usz); let off = 0;
          for (const c of chunks) { out.set(c, off); off += c.length; }
          files[name] = out;
        } catch { files[name] = cd; }
      }
    }
    return files;
  }

  function xml(b) { return new DOMParser().parseFromString(new TextDecoder().decode(b),'application/xml'); }
  function col(ref) { const m=ref.match(/^([A-Z]+)/); if(!m)return 0; let n=0; for(const c of m[1]) n=n*26+c.charCodeAt(0)-64; return n-1; }
  function row(ref) { const m=ref.match(/(\d+)$/); return m?parseInt(m[1])-1:0; }

  async function read(ab) {
    const zip = await unzip(ab);
    const sst = {};
    if (zip['xl/sharedStrings.xml']) {
      xml(zip['xl/sharedStrings.xml']).querySelectorAll('si').forEach((si,i)=>{
        sst[i] = [...si.querySelectorAll('t')].map(t=>t.textContent).join('');
      });
    }
    const wbDoc = xml(zip['xl/workbook.xml']);
    const sheets = [...wbDoc.querySelectorAll('sheet')].map(s=>({
      name: s.getAttribute('name'), id: s.getAttribute('r:id')||s.getAttribute('id')
    }));
    const rels = {};
    if (zip['xl/_rels/workbook.xml.rels']) {
      xml(zip['xl/_rels/workbook.xml.rels']).querySelectorAll('Relationship').forEach(r=>{
        rels[r.getAttribute('Id')] = r.getAttribute('Target');
      });
    }
    const result = { SheetNames: sheets.map(s=>s.name), Sheets: {} };
    for (const sh of sheets) {
      const tgt = rels[sh.id] || `worksheets/sheet${sheets.indexOf(sh)+1}.xml`;
      const path = tgt.startsWith('/') ? tgt.slice(1) : `xl/${tgt}`;
      if (!zip[path]) continue;
      const rs = {};
      xml(zip[path]).querySelectorAll('c').forEach(c=>{
        const ref = c.getAttribute('r'); if(!ref) return;
        const ri = row(ref), ci = col(ref), t = c.getAttribute('t');
        const vEl = c.querySelector('v'); if(!vEl) return;
        let val = vEl.textContent;
        if (t==='s') val = sst[parseInt(val)]??'';
        else if (t==='b') val = val==='1';
        else if (!t||t==='n') { const n=parseFloat(val); if(!isNaN(n)) val=n; }
        if (!rs[ri]) rs[ri]=[];
        rs[ri][ci] = val;
      });
      const mx = Math.max(-1,...Object.keys(rs).map(Number));
      const data = [];
      for (let i=0;i<=mx;i++) data.push(rs[i]||[]);
      result.Sheets[sh.name] = data;
    }
    return result;
  }
  return { read };
})();

// ══════════════════════════════════════════════════════════
// CSV PARSER (separatore ; o ,  — gestisce BOM)
// ══════════════════════════════════════════════════════════
function parseCSV(text) {
  if (text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  if (!lines.length) return [];
  const sep = lines[0].split(';').length > lines[0].split(',').length ? ';' : ',';
  return lines.map(line=>{
    const cols=[]; let cur='', inQ=false;
    for (const ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===sep&&!inQ) { cols.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    cols.push(cur.trim());
    return cols;
  });
}

// HELPERS
// ══════════════════════════════════════════════════════════
const N  = v => typeof v==='number'&&!isNaN(v)?v:0;
function _fmtAbs(n){const [i,d]=Math.abs(n).toFixed(2).split(".");return i.replace(/\B(?=(\d{3})+(?!\d))/g,".")+","+d;}
const fmt = v => { const n=N(v); return n<0?'('+_fmtAbs(n)+')':_fmtAbs(n); };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const cn  = v => v<0?'neg':'pos';

function kids(struct, pid) {
  return struct.filter(n=>n.parentId===pid);
}
function descendants(struct, pid) {
  const ch = kids(struct,pid).map(n=>n.id);
  return [...ch,...ch.flatMap(id=>descendants(struct,id))];
}
function depth(struct, id, d=0) {
  const n=struct.find(x=>x.id===id);
  return (!n||!n.parentId)?d:depth(struct,n.parentId,d+1);
}

// Risolve un codice nodo del mapping nella struttura.
// Supporta: match esatto, o prefisso numerico ("1602" → "1602 - Denaro e valori in cassa")
function resolveNode(struct, code) {
  if (!code) return null;
  if (struct.find(n=>n.id===code)) return code;
  const found = struct.find(n=>n.id.startsWith(code+' -')||n.id.startsWith(code+' '));
  return found ? found.id : null;
}

// Saldo di un conto in un bilancio (YTD=fin, PTD=fin-ini)
// Anno fiscale 01/04/Y-31/03/Y+1. PTD = delta vs mese precedente.
function periodYM(p){ return String(p||'').slice(0,7); }
function fiscalYearStart(period) {
  const s=String(period||'').slice(0,7).split('-');
  const y=parseInt(s[0]||0), m=parseInt(s[1]||0);
  return (m>=4?y:y-1)+'-04';
}
function prevBilancio(bil) {
  const sorted=[...S.bilanci].sort((a,b)=>a.period.localeCompare(b.period));
  const idx=sorted.findIndex(b=>b.period===bil.period);
  return idx>0?sorted[idx-1]:null;
}
function getBalanceYTD(bil,accountId){
  const r=bil.rows.find(x=>x.id===accountId); return r?N(r.fin):0;
}
function getBalance(bil, accountId, mode) {
  if(mode==='ytd') return getBalanceYTD(bil,accountId);
  const prev=prevBilancio(bil);
  if(prev) return getBalanceYTD(bil,accountId)-getBalanceYTD(prev,accountId);
  const r=bil.rows.find(x=>x.id===accountId);
  return r?N(r.fin)-N(r.ini):0;
}

// Totale di un nodo (inclusi discendenti) in un bilancio
// Valuta formula esplicita di un nodo (es: "A + B - C" o "A / B")
// Supporta: +, -, / tra ID nodo. Prefisso "=" ignorato.
function evalFormula(formula, struct, mapping, mapKey, bil, mode) {
  const expr = formula.replace(/^=\s*/, '').trim();
  // Gestione divisione (percentuale): "A / B"
  if (expr.includes('/') && !expr.includes('+') && !expr.includes('-')) {
    const parts = expr.split('/').map(s=>s.trim());
    if (parts.length === 2) {
      const a = nodeTotal(struct, mapping, mapKey, bil, parts[0], mode);
      const b = nodeTotal(struct, mapping, mapKey, bil, parts[1], mode);
      return b !== 0 ? a / b : 0;
    }
  }
  // Tokenizza: split su + e - mantenendo il segno
  let result = 0;
  const tokens = expr.split(/(?=[+\-])/).map(s=>s.trim()).filter(Boolean);
  for (const tok of tokens) {
    const sign = tok.startsWith('-') ? -1 : 1;
    const id   = tok.replace(/^[+\-]\s*/, '').trim();
    if (!id) continue;
    result += sign * nodeTotal(struct, mapping, mapKey, bil, id, mode);
  }
  return result;
}

function nodeTotal(struct, mapping, mapKey, bil, nodeId, mode) {
  // Se il nodo ha una formula esplicita, usala (evita doppi conteggi)
  const nodeDef = struct.find(n=>n.id===nodeId);
  if (nodeDef?.formula) return evalFormula(nodeDef.formula, struct, mapping, mapKey, bil, mode);
  // mapKey: 'civ' o 'corp' — internamente usa civD/civC o corpD/corpC in base al segno del saldo
  const scope = new Set([nodeId,...descendants(struct,nodeId)]);
  const kD = mapKey==='civ'?'civD':'corpD';
  const kC = mapKey==='civ'?'civC':'corpC';
  return S.coa.reduce((sum,a)=>{
    const bal = getBalance(bil, a.id, mode);
    const rawTarget = bal>=0 ? (mapping[a.id]?.[kD]||mapping[a.id]?.[kC]) : (mapping[a.id]?.[kC]||mapping[a.id]?.[kD]);
    const target = resolveNode(struct, rawTarget);
    if (!target||!scope.has(target)) return sum;
    return sum + bal;
  }, 0);
}

// ══════════════════════════════════════════════════════════
// SAP BALANCE PARSER
// ══════════════════════════════════════════════════════════
function parseSAP(rows) {
  // Legge metadati: società, data inizio (B21=idx20), data fine (B23=idx22)
  const meta = {};
  for (let i=0;i<Math.min(rows.length,30);i++) {
    const k = String(rows[i]?.[0]||'').trim();
    const v = String(rows[i]?.[1]||'').trim();
    if (k==='Società') meta.company = v;
    if (k==='Data di reg. dal') meta.dateFrom = v;
    if (k==='Data di reg. al')  meta.dateTo   = v;
  }
  // Converti data GG.MM.AAAA → AAAA-MM-GG
  function cvDate(s) {
    const m = String(s||'').match(/(\d{1,2})\.(\d{2})\.(\d{4})/);
    return m ? `${m[3]}-${m[2]}-${m[1].padStart(2,'0')}` : s;
  }
  meta.dateFrom = cvDate(meta.dateFrom);
  meta.dateTo   = cvDate(meta.dateTo);
  meta.period   = meta.dateTo || 'Sconosciuto';

  // Parser numerico robusto: gestisce formato italiano (1.388,03), anglosassone (1388.03)
  // e stringhe con segno negativo o parentesi tipo (1.388,03)
  function parseItNum(v) {
    if (typeof v === 'number') return isNaN(v) ? 0 : v;
    let s = String(v || '').trim();
    if (!s) return 0;
    // Parentesi = negativo: (1.388,03) → -1388.03
    const neg = s.startsWith('(') && s.endsWith(')');
    s = s.replace(/[()]/g, '').trim();
    // Rimuovi spazi interni e simboli valuta
    s = s.replace(/\s/g, '').replace(/[€$£]/g, '');
    // Determina formato: se c'è virgola E punto, il più a destra è il decimale
    const hasDot   = s.includes('.');
    const hasComma = s.includes(',');
    if (hasDot && hasComma) {
      // es. 1.388,03 → punto=migliaia, virgola=decimale
      if (s.lastIndexOf('.') < s.lastIndexOf(',')) {
        s = s.replace(/\./g, '').replace(',', '.');
      } else {
        // es. 1,388.03 → virgola=migliaia, punto=decimale
        s = s.replace(/,/g, '');
      }
    } else if (hasComma) {
      // Solo virgola: può essere decimale (1388,03) o migliaia (1,388)
      const parts = s.split(',');
      if (parts.length === 2 && parts[1].length <= 2) {
        s = parts[0] + '.' + parts[1]; // decimale
      } else {
        s = s.replace(/,/g, ''); // migliaia
      }
    }
    // A questo punto solo cifre e punto decimale
    const n = parseFloat(s) || 0;
    return neg ? -n : n;
  }

  // Trova header "Conto Co.Ge."
  const hdrIdx = rows.findIndex(r=>r?.some(c=>String(c||'').includes('Conto Co.Ge.')));
  if (hdrIdx < 0) return null;

  // Colonne: A=codice, B=descr, C=saldo iniziale, D=saldo finale
  const data = [];
  for (let i=hdrIdx+1;i<rows.length;i++) {
    const r = rows[i]; if(!r||!r[0]) continue;
    const id = String(r[0]).trim();
    if (!id || id==='Somma totale') continue;
    const ini = typeof r[2]==='number' ? r[2] : parseItNum(r[2]);
    const fin = typeof r[3]==='number' ? r[3] : parseItNum(r[3]);
    data.push({id, name: String(r[1]||'').trim(), ini, fin});
  }
  return data.length ? { ...meta, rows: data } : null;
}

// ══════════════════════════════════════════════════════════
// MAPPING PARSERS
// ══════════════════════════════════════════════════════════
// Importa mapping da CSV export dell'app (formato: ID;Nome;CivDare;CivAvere;CorpDare;CorpAvere)
// oppure da Excel (foglio mapping con civile)
function parseMappingCSV(rows) {
  const h = rows[0].map(c=>String(c||'').toLowerCase().trim());
  const iID  = h.findIndex(c=>c.includes('id')||c.includes('codice')); 
  const iNM  = 1; // nome sempre in col 1
  // Nuovo formato (6 col): Civ Dare, Civ Avere, Corp Dare, Corp Avere
  const iCivD  = h.findIndex(c=>c.includes('civ')&&c.includes('dare'));
  const iCivC  = h.findIndex(c=>c.includes('civ')&&c.includes('avere'));
  const iCorpD = h.findIndex(c=>c.includes('corp')&&c.includes('dare'));
  const iCorpC = h.findIndex(c=>c.includes('corp')&&c.includes('avere'));
  // Vecchio formato (4 col): Civile, Corporate — mappa su Dare e Avere uguali
  const iCiv   = iCivD<0 ? h.findIndex(c=>c.includes('civ')||c.includes('locale')) : -1;
  const iCorp  = iCorpD<0 ? h.findIndex(c=>c.includes('corp')) : -1;
  const mapping={}, coa=[];
  const seen=new Set();
  for (let i=1;i<rows.length;i++) {
    const r=rows[i]; if(!r||!r[0]) continue;
    const id=String(r[iID>=0?iID:0]).trim();
    const name=String(r[iNM]||'').trim();
    if (!id) continue;
    if (!seen.has(id)) { coa.push({id,name}); seen.add(id); }
    if (iCivD>=0) {
      // Nuovo formato
      mapping[id] = {
        civD:  String(r[iCivD]||'').trim(),
        civC:  String(r[iCivC>=0?iCivC:iCivD]||'').trim(),
        corpD: String(r[iCorpD>=0?iCorpD:4]||'').trim(),
        corpC: String(r[iCorpC>=0?iCorpC:(iCorpD>=0?iCorpD+1:5)]||'').trim(),
      };
    } else {
      // Vecchio formato: civ/corp → entrambi Dare e Avere uguali
      const c=String(r[iCiv>=0?iCiv:2]||'').trim();
      const p=String(r[iCorp>=0?iCorp:3]||'').trim();
      mapping[id] = { civD:c, civC:c, corpD:p, corpC:p };
    }
  }
  return {mapping, coa};
}

// Importa struttura + mapping da Excel (foglio "mapping con civile")
// Colonne: A=codice, B=descr, C=en, D=Sezione, E=Gruppo, F=Nodo
function parseMappingExcel(rows) {
  const first = rows[0]?.[0];
  const start = (typeof first==='string'&&isNaN(Number(first)))?1:0;
  const sez=new Map(), grp=new Map(), nod=new Map();
  const mapping={}, coa=[];
  const seen=new Set();
  for (let i=start;i<rows.length;i++) {
    const r=rows[i]; if(!r||r[0]==null||r[0]==='') continue;
    const id=String(r[0]).trim();
    const name=String(r[1]||'').trim();
    const s=r[3]!=null?String(r[3]).trim():null;
    const g=r[4]!=null?String(r[4]).trim():null;
    const n=r[5]!=null?String(r[5]).trim():null;
    if (!seen.has(id)) { coa.push({id,name}); seen.add(id); }
    if (!s) continue;
    if (!sez.has(s)) sez.set(s,{id:s,name:s,parentId:null});
    let gId=null;
    if (g) { gId=g; if(!grp.has(g)) grp.set(g,{id:g,name:g,parentId:s}); }
    let nId=null;
    if (n&&n!=='-') { nId=n; if(!nod.has(n)) nod.set(n,{id:n,name:n,parentId:gId||s}); }
    const target = nId||gId||s;
    mapping[id] = { civD: target, civC: target, corpD: '', corpC: '' };
  }
  const struct = [...sez.values(),...grp.values(),...nod.values()];
  return {mapping, coa, struct};
}

function dashKPI() {
  if (!S.bilanci.length) return '';
  const struct = S.civile.length ? S.civile : S.corporate;
  const mapKey = S.civile.length ? 'civ' : 'corp';
  // Filtra e ordina i periodi selezionati
  const selP = dashPeriods.length ? dashPeriods : S.bilanci.map(b=>b.period);
  const bils = [...S.bilanci]
    .filter(b=>selP.includes(b.period))
    .sort((a,b)=>a.period.localeCompare(b.period));
  if (!bils.length) return '<p style="color:#a8a29e;font-size:12px">Nessun periodo selezionato.</p>';

  function fn(...hints) {
    for (const h2 of hints) {
      const lo = h2.toLowerCase();
      let n = struct.find(n=>n.id.toLowerCase()===lo||n.id.toLowerCase().startsWith(lo+' -')||n.id.toLowerCase().startsWith(lo+' '));
      if (n) return n;
      n = struct.find(n=>n.id.toLowerCase().includes(lo)||n.name.toLowerCase().includes(lo));
      if (n) return n;
    }
    return null;
  }

  function cassaTot(b) {
    const nd=fn('16 - disponibilit','disponibilit'); if(!nd) return null;
    const ex=fn('1603'); const exIds=ex?new Set([ex.id,...descendants(struct,ex.id)]):new Set();
    const scope=new Set([nd.id,...descendants(struct,nd.id)].filter(x=>!exIds.has(x)));
    const kD3=mapKey==='civ'?'civD':'corpD', kC3=mapKey==='civ'?'civC':'corpC';
    return S.coa.reduce((s,a)=>{
      const ytd=getBalanceYTD(b,a.id);
      const raw=ytd>=0?(S.mapping[a.id]?.[kD3]||S.mapping[a.id]?.[kC3]):(S.mapping[a.id]?.[kC3]||S.mapping[a.id]?.[kD3]);
      const t=resolveNode(struct,raw);
      return (t&&scope.has(t))?s+getBalance(b,a.id,dashMode):s;
    },0);
  }

  function calcUtileKPI(b, excludeTax) {
    // Struttura Civile: (D + E) - nodo 9 Gestionale
    const civStruct = S.civile;
    const civKey = 'civ';
    const nD = civStruct.find(n=>n.id==='D'||n.id.startsWith('D ')||n.id.startsWith('D-')||n.name.toLowerCase().startsWith('costi'));
    const nE = civStruct.find(n=>n.id==='E'||n.id.startsWith('E ')||n.id.startsWith('E-')||n.name.toLowerCase().startsWith('ricavi'));
    if (!nD && !nE) return null;
    const totD = nD ? nodeTotal(civStruct,S.mapping,civKey,b,nD.id,dashMode) : 0;
    const totE = nE ? nodeTotal(civStruct,S.mapping,civKey,b,nE.id,dashMode) : 0;
    // Sottrai nodo 9 Gestionale da entrambi
    const n9 = civStruct.find(n=>n.id==='9 Gestionale'||n.id==='9'||n.id.startsWith('9 ')||n.name.toLowerCase().includes('gestionale'));
    const tot9 = n9 ? nodeTotal(civStruct,S.mapping,civKey,b,n9.id,dashMode) : 0;
    const utileNetto = totD + totE - tot9;
    if (!excludeTax) return utileNetto;
    // Utile ante imposte = utile netto - nodo 63
    const n63 = civStruct.find(n=>n.id==='63'||n.id.startsWith('63 ')||n.id.startsWith('63-'));
    const tot63 = n63 ? nodeTotal(civStruct,S.mapping,civKey,b,n63.id,dashMode) : 0;
    return utileNetto - tot63;
  }

  const kpiDefs = [
    {ic:'\u{1f4c8}', label:'Fatturato',         note:'nodo 4001',    color:'#15803d', border:'#bbf7d0', bg:'#f0fdf4',
     f:(b)=>{ const n=fn('4001'); return n?nodeTotal(struct,S.mapping,mapKey,b,n.id,dashMode):null; }},
    {ic:'\u{1f4e3}', label:'Marketing',          note:'nodo 5202',    color:'#7e22ce', border:'#e9d5ff', bg:'#faf5ff',
     f:(b)=>{ const n=fn('5202'); return n?nodeTotal(struct,S.mapping,mapKey,b,n.id,dashMode):null; }},
    {ic:'\u{1f3ed}', label:'Magazzino',          note:'',             color:'#0891b2', border:'#bae6fd', bg:'#f0f9ff',
     f:(b)=>{ const n=fn('1201','magazzino'); return n?nodeTotal(struct,S.mapping,mapKey,b,n.id,dashMode):null; }},
    {ic:'\u{1f4b5}', label:'Cassa netta',        note:'escluso 1603', color:'#0369a1', border:'#bfdbfe', bg:'#eff6ff',
     f:(b)=>cassaTot(b)},
    {ic:'\u{1f4ca}', label:'Utile ante imposte', note:'',             color:'#0369a1', border:'#bae6fd', bg:'#f0f9ff',
     f:(b)=>calcUtileKPI(b,true)},
    {ic:'\u{1f4b0}', label:'Utile netto',        note:'',             color:'#0c4a6e', border:'#7dd3fc', bg:'#e0f2fe',
     f:(b)=>calcUtileKPI(b,false)},
  ];

  const cards = kpiDefs.map(d=>{
    const vals = bils.map(b=>d.f(b));
    if (vals.every(v=>v===null)) return '';

    // Ultima riga in grande, le precedenti più piccole
    const rows = bils.map((b,i)=>{
      const v = vals[i];
      const numColor = v===null?'#d1d5db':v<0?'#dc2626':d.color;
      const numStr = v===null ? '—' : fmt(v);
      return '<div style="display:flex;justify-content:space-between;align-items:baseline;'
        + (i>0?'border-top:1px solid '+d.border+';':'')
        + 'padding:5px 0">'
        + '<span style="font-size:12px;color:#64748b;font-weight:400">'+esc(periodYM(b.period))+'</span>'
        + '<span style="font-family:monospace;font-size:13px;font-weight:600;color:'+numColor+'">'+numStr+'</span>'
        + '</div>';
    }).join('');

    return '<div style="background:'+d.bg+';border:1px solid '+d.border+';border-radius:12px;padding:12px 14px;min-width:160px;flex:1">'
      + '<p style="font-size:13px;font-weight:700;color:#334155;margin-bottom:10px">'
      + d.ic+' '+d.label
      + (d.note?'<span style="font-size:9px;color:#a8a29e;margin-left:5px">'+d.note+'</span>':'')
      + '</p>'
      + rows
      + '</div>';
  }).filter(Boolean).join('');

  return '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px">'+cards+'</div>';
}

function dashTogglePeriod(p) {
  if (dashPeriods.includes(p)) {
    if (dashPeriods.length === 1) return; // almeno 1 sempre attivo
    dashPeriods = dashPeriods.filter(x=>x!==p);
  } else {
    dashPeriods = [...dashPeriods, p].sort();
  }
  rDash();
}

function dashSetMode(m) {
  dashMode = m;
  rDash();
}

function delBil(period) {

  _fileHandles.delete(period);

  rImpTab();
}

function showMsg(id,type,html) {
  const el=document.getElementById(id); if(el) el.innerHTML=`<div class="alert ${type}" style="margin-top:10px">${html}</div>`;

async function impBil(inp) {
  const files=[...inp.files].filter(f=>!f.name.startsWith('~$'));
  if(!files.length) return;
  showMsg('msg-bil','info','Lettura file...');
  let ok=0, err=[];
  for (const f of files) {
    try {
      const wb = await XLSX.read(await f.arrayBuffer());
      const rows = wb.Sheets[wb.SheetNames[0]];
      const bil = parseSAP(rows);
      if (!bil) { err.push(f.name+': formato non riconosciuto'); continue; }
      set(s=>{
        const others = s.bilanci.filter(b=>b.period!==bil.period);
        return { bilanci: [...others, bil].sort((a,b)=>a.period.localeCompare(b.period)) };
      });
      // Salva handle per auto-reload (File System Access API)
      if (f.handle) _fileHandles.set(bil.period, { handle: f.handle, period: bil.period });
      ok++;
    } catch(e) { err.push(f.name+': '+e.message); }
  }
  const msg = ok ? `✓ ${ok} bilancio/i importato/i.` : '';
  const errMsg = err.length ? '<br>⚠ '+err.join('<br>') : '';
  showMsg('msg-bil', ok?'ok':'err', msg+errMsg);
  inp.value='';
  rImpTab();
}

// Ricarica un singolo bilancio dal suo file handle
async function reloadBil(period) {
  const entry = _fileHandles.get(period);
  if (!entry) { alert('Handle non disponibile — ricarica il file manualmente.'); return; }
  try {
    // Verifica permesso lettura
    const perm = await entry.handle.queryPermission({ mode: 'read' });
    if (perm !== 'granted') {
      const req = await entry.handle.requestPermission({ mode: 'read' });
      if (req !== 'granted') { alert('Permesso negato.'); return; }
    }
    const file = await entry.handle.getFile();
    const wb = await XLSX.read(await file.arrayBuffer());
    const bil = parseSAP(wb.Sheets[wb.SheetNames[0]]);
    if (!bil) { alert(entry.handle.name + ': formato non riconosciuto'); return; }
    set(s=>({ bilanci: [...s.bilanci.filter(b=>b.period!==bil.period), bil].sort((a,b)=>a.period.localeCompare(b.period)) }));
    _fileHandles.set(bil.period, { handle: entry.handle, period: bil.period });
    rImpTab();
    showMsg('msg-bil','ok','✓ Periodo '+period+' ricaricato.');
  } catch(e) { alert('Errore: '+e.message); }
}

// Ricarica tutti i bilanci con handle disponibile
async function reloadAll() {
  if (!_fileHandles.size) { alert('Nessun file handle disponibile. Carica i file almeno una volta in questa sessione.'); return; }
  showMsg('msg-bil','info','🔄 Ricarico tutti i file...');
  let ok=0, err=[];
  for (const [period, entry] of _fileHandles) {
    try {
      const perm = await entry.handle.queryPermission({ mode: 'read' });
      if (perm !== 'granted') await entry.handle.requestPermission({ mode: 'read' });
      const file = await entry.handle.getFile();
      const wb = await XLSX.read(await file.arrayBuffer());
      const bil = parseSAP(wb.Sheets[wb.SheetNames[0]]);
      if (!bil) { err.push(period+': non riconosciuto'); continue; }
      set(s=>({ bilanci: [...s.bilanci.filter(b=>b.period!==bil.period), bil].sort((a,b)=>a.period.localeCompare(b.period)) }));
      ok++;
    } catch(e) { err.push(period+': '+e.message); }
  }
  rImpTab();
  const msg = ok ? '✓ '+ok+' periodo/i ricaricato/i.' : '';
  const errMsg = err.length ? ' ⚠ '+err.join(', ') : '';
  showMsg('msg-bil', ok?'ok':'err', msg+errMsg);
}

// Usa File System Access API per aprire file con handle
async function pickBilFile() {
  if (!window.showOpenFilePicker) {
    document.getElementById('fi-bil').click(); return;
  }
  try {
    const handles = await window.showOpenFilePicker({
      multiple: true,
      types: [{ description: 'SAP Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }]
    });
    showMsg('msg-bil','info','Lettura file...');
    let ok=0, err=[];
    for (const handle of handles) {
      try {
        const file = await handle.getFile();
        const wb = await XLSX.read(await file.arrayBuffer());
        const bil = parseSAP(wb.Sheets[wb.SheetNames[0]]);
        if (!bil) { err.push(handle.name+': formato non riconosciuto'); continue; }
        set(s=>({ bilanci: [...s.bilanci.filter(b=>b.period!==bil.period), bil].sort((a,b)=>a.period.localeCompare(b.period)) }));
        _fileHandles.set(bil.period, { handle, period: bil.period });
        ok++;
      } catch(e) { err.push(handle.name+': '+e.message); }
    }
    rImpTab();
    const msg = ok ? '✓ '+ok+' bilancio/i importato/i — 🔄 ricarica automatica attiva.' : '';
    const errMsg = err.length ? '<br>⚠ '+err.join('<br>') : '';
    showMsg('msg-bil', ok?'ok':'err', msg+errMsg);
  } catch(e) { if (e.name!=='AbortError') alert('Errore: '+e.message); }
}

// ── Cartella SAP ────────────────────────────────────────
async function pickFolder() {
  if (!window.showDirectoryPicker) {
    alert("Il tuo browser non supporta la selezione cartella.\nUsa Chrome o Edge.");
    return;
  }
  try {
    const folder = await window.showDirectoryPicker({ mode: "read" });
    _folderHandle = folder;
    _folderName   = folder.name;
    rImpTab();
    await loadFromFolder(false);
  } catch(e) {
    if (e.name !== "AbortError") alert("Errore: " + e.message);
  }
}

async function loadFromFolder(silent) {
  if (!_folderHandle) { alert("Nessuna cartella selezionata."); return; }
  const perm = await _folderHandle.queryPermission({ mode: "read" });
  if (perm !== "granted") {
    const req = await _folderHandle.requestPermission({ mode: "read" });
    if (req !== "granted") { alert("Permesso negato."); return; }
  }
  if (!silent) showMsg("msg-bil","info","🔄 Lettura cartella …");
  let ok=0, changed=0, skipped=0, errs=[];
  for await (const [name, entry] of _folderHandle.entries()) {
    if (entry.kind !== "file") continue;
    if (!name.toLowerCase().endsWith(".xlsx")) continue;
    if (name.startsWith("~$")) continue;
    try {
      const file = await entry.getFile();
      const wb   = await XLSX.read(await file.arrayBuffer());
      const sheetName = wb.SheetNames[0];
      if (!sheetName || !wb.Sheets[sheetName]) { skipped++; continue; }
      const bil  = parseSAP(wb.Sheets[sheetName]);
      if (!bil) { skipped++; continue; }
      set(s=>({ bilanci:[...s.bilanci.filter(b=>b.period!==bil.period),bil]
                          .sort((a,b)=>a.period.localeCompare(b.period)) }));
      _fileHandles.set(bil.period, { handle:entry, period:bil.period });
      ok++; changed++;
    } catch(e) { errs.push(name+": "+e.message); }
  }
  rImpTab();
  if (!silent || changed>0) {
    const msg = ok
      ? "✓ "+ok+" file letti da \""+esc(_folderName||"")+"\""
        +(changed?" — "+changed+" aggiornati":" — nessuna variazione")
        +(skipped?" ("+skipped+" non SAP ignorati)":"")+"."
      : "Nessun file SAP trovato nella cartella.";
    const errMsg = errs.length?" ⚠ "+errs.join(", "):"";
    showMsg("msg-bil", ok?"ok":"err", msg+errMsg);
  }
  if (ok>0) renderAll();
}

async function impMap(inp) {
  const f=inp.files[0]; if(!f) return;
  showMsg('msg-map','info','Lettura file...');
  try {
    let mapping, coa, struct=null;
    if (f.name.toLowerCase().endsWith('.csv')) {
      const rows = parseCSV(await f.text());
      ({mapping,coa} = parseMappingCSV(rows));
    } else {
      const wb = await XLSX.read(await f.arrayBuffer());
      const shMap = wb.SheetNames.find(n=>n.toLowerCase().includes('mapping')||n.toLowerCase().includes('civil'))
                    || wb.SheetNames[1] || wb.SheetNames[0];
      const shCoa = wb.SheetNames.find(n=>n.toLowerCase().includes('piano')) || wb.SheetNames[0];
      const res = parseMappingExcel(wb.Sheets[shMap]);
      mapping=res.mapping; coa=res.coa; struct=res.struct; // mapping già in formato {civD,civC,corpD,corpC}
      // Se c'è anche un foglio piano conti separato, usa quello per i nomi
      if (shCoa!==shMap) {
        const coaRows=wb.Sheets[shCoa];
        const first=coaRows[0]?.[0];
        const start=(typeof first==='string'&&isNaN(Number(first)))?1:0;
        const seen=new Set(); coa=[];
        for(let i=start;i<coaRows.length;i++){
          const r=coaRows[i]; if(!r||r[0]==null) continue;
          const id=String(r[0]).trim(), name=String(r[1]||'').trim();
          if(id&&!seen.has(id)){coa.push({id,name});seen.add(id);}
        }
      }
    }
    const nM=Object.keys(mapping).length;
    if(!nM){showMsg('msg-map','err','Nessun mapping trovato.');inp.value='';return;}
    set(s=>({
      coa: coa.length>0 ? coa : s.coa,
      mapping: {...s.mapping,...mapping},
      civile: struct&&struct.length>0 ? struct : s.civile,
    }));
    const msgs=[`✓ Mapping: ${nM} conti`];
    if(coa.length) msgs.push(`✓ Piano dei conti: ${coa.length} conti`);
    if(struct&&struct.length) msgs.push(`✓ Struttura civile: ${struct.length} nodi`);
    showMsg('msg-map','ok',msgs.join('<br>'));
  } catch(e) { showMsg('msg-map','err','Errore: '+e.message); }
  inp.value='';
}

// Nodi espansi nella vista struttura
const _sExpanded = {};
function toggleSNode(key,nid){
  if(!_sExpanded[key]) _sExpanded[key]=new Set();
  if(_sExpanded[key].has(nid)) _sExpanded[key].delete(nid);
  else _sExpanded[key].add(nid);
  const cfg=key==='civ'
    ?{t:'Struttura Civile',s:S.civile,bg:'#f0fdf4',br:'#bbf7d0',co:'#14532d'}
    :{t:'Struttura Corporate',s:S.corporate,bg:'#faf5ff',br:'#e9d5ff',co:'#581c87'};
  renderSBox(key,cfg.t,cfg.s,cfg.bg,cfg.br,cfg.co);
}
function renderNode(key,struct,node,lv,col) {
  const ch=kids(struct,node.id);
  if(!_sExpanded[key]) _sExpanded[key]=new Set();
  // Radici (lv=0) sempre espanse; figli collassati di default
  const isExpanded = lv===0 || _sExpanded[key].has(node.id);
  const tog = ch.length
    ? `<span onclick="event.stopPropagation();toggleSNode('${key}','${esc(node.id)}')" style="cursor:pointer;margin-right:3px;font-size:9px;color:${col}">${isExpanded?'▼':'▶'}</span>`
    : '<span style="display:inline-block;width:13px"></span>';
  return `<div class="sn">
    <div class="sr" style="padding-left:${lv*16+8}px">
      ${tog}
      <span style="font-family:monospace;font-size:10px;color:#a8a29e;min-width:60px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(node.id)}">${esc(node.id.length>14?node.id.slice(0,13)+'…':node.id)}</span>
      <span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(node.name)}</span>
      <div class="sa">
        <button class="ib" title="Aggiungi figlio" onclick="addNodeChild('${key}','${esc(node.id)}')">➕</button>
        <button class="ib" title="Elimina" style="color:#dc2626" onclick="delNode('${key}','${esc(node.id)}')">🗑</button>
      </div>
    </div>
    ${isExpanded?ch.map(c=>renderNode(key,struct,c,lv+1,col)).join(''):''}
  </div>`;
}

function addNode(key,parentId) {
  const id=(document.getElementById('sid-'+key)?.value||'').trim();
  const nm=(document.getElementById('snm-'+key)?.value||'').trim();
  if(!id||!nm){alert('Inserisci ID e Nome');return;}
  const struct=key==='civ'?[...S.civile]:[...S.corporate];
  if(struct.some(n=>n.id===id)){alert('ID già presente');return;}
  struct.push({id,name:nm,parentId:parentId||null});
  if(key==='civ') set({civile:struct}); else set({corporate:struct});
}
function addNodeChild(key,parentId) {
  const id=prompt('ID figlio di "'+parentId+'":'); if(!id) return;
  const nm=prompt('Nome:'); if(!nm) return;
  const struct=key==='civ'?[...S.civile]:[...S.corporate];
  if(struct.some(n=>n.id===id)){alert('ID già presente');return;}
  struct.push({id,name:nm,parentId});
  if(key==='civ') set({civile:struct}); else set({corporate:struct});
}
function delNode(key,id) {
  if(!confirm('Eliminare "'+id+'" e tutti i figli?')) return;
  const orig=key==='civ'?S.civile:S.corporate;
  const del=new Set([id]); let ch=true;
  while(ch){ch=false;orig.forEach(n=>{if(n.parentId&&del.has(n.parentId)&&!del.has(n.id)){del.add(n.id);ch=true;}});}
  const struct=orig.filter(n=>!del.has(n.id));
  if(key==='civ') set({civile:struct}); else set({corporate:struct});
}
async function importStruct(key,inp) {
  const f=inp.files[0]; if(!f) return;
  try {
    let rows;
    if(f.name.toLowerCase().endsWith('.csv')) rows=parseCSV(await f.text());
    else { const wb=await XLSX.read(await f.arrayBuffer()); rows=wb.Sheets[wb.SheetNames[0]]; }
    const h=rows[0].map(c=>String(c||'').toLowerCase());
    const si=h.some(c=>c==='id'||c==='codice'||c.includes('codice')||c==='a (codice)')?1:0;
    const ic=h.findIndex(c=>c==='id'||c==='codice'||c.includes('codice')||c==='a (codice)'); const iID=ic>=0?ic:0;
    const in2=h.findIndex(c=>c.includes('nome')||c.includes('descr')||c.includes('name')||c==='b (voce)'); const iNM=in2>=0?in2:1;
    const ip=h.findIndex(c=>c.includes('parent')||c.includes('padre')||c==='c (parent)'); const iPR=ip>=0?ip:2;
    const ifo=h.findIndex(c=>c.includes('formula')||c.includes('calcolo')||c.includes('tipo')||c==='d (tipocalcolo)'); const iFO=ifo>=0?ifo:3;
    const out=[]; const seen=new Set();
    for(let i=si;i<rows.length;i++){
      const r=rows[i]; if(!r||!r[iID]) continue;
      const id=String(r[iID]).trim(), nm=String(r[iNM]||'').trim();
      const pr=r[iPR]?String(r[iPR]).trim():null;
      const fo=r[iFO]?String(r[iFO]).trim():null;
      const formula=(fo&&fo!=='Dettaglio'&&fo!=='')?fo:null;
      if(id&&nm&&!seen.has(id)){out.push({id,name:nm,parentId:pr||null,formula:formula||undefined});seen.add(id);}
    }
    // Crea automaticamente nodi radice mancanti (referenziati come parent ma non dichiarati)
    const outIds = new Set(out.map(n=>n.id));
    const missingRoots = new Set();
    out.forEach(n=>{ if(n.parentId && !outIds.has(n.parentId)) missingRoots.add(n.parentId); });
    missingRoots.forEach(id=>{ out.unshift({id, name:id, parentId:null}); });
    if(!out.length){alert('Nessun nodo trovato');inp.value='';return;}
    if(!confirm(`Trovati ${out.length} nodi. Sostituire la struttura ${key==='civ'?'Civile':'Corporate'}?`)){inp.value='';return;}
    if(key==='civ') { set({civile:out}); renderSBox('civ','Struttura Civile',out,'#f0fdf4','#bbf7d0','#14532d'); }
    else { set({corporate:out}); renderSBox('corp','Struttura Corporate',out,'#faf5ff','#e9d5ff','#581c87'); }
  } catch(e){alert('Errore: '+e.message);}
  inp.value='';
}
function exportStructCSV(key) {
  const struct=key==='civ'?S.civile:S.corporate;
  const rows=['ID,Nome,ParentID,Formula',...struct.map(n=>[n.id,n.name,n.parentId||'',n.formula||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))];
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.join('\n'));
  a.download=`struttura_${key}.csv`; a.click();
}

function mkSel(accountId,field,struct,value) {
  const node=struct.find(n=>n.id===value||n.id.startsWith(value+' '));
  const label=node?(node.id.length>22?node.id.slice(0,20)+'…':node.id):(value||'—');
